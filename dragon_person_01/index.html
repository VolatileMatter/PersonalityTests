<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What Dragon Are You?</title>
  <link rel="stylesheet" href="../shared.css">
  <style>
    #screen-reveal {
      min-height: 60vh;
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      text-align: center; gap: 1.25rem;
    }
    #screen-reveal.active { display: flex; animation: screenIn 0.35s ease; }

    .reveal-glyph {
      font-size: 5.5rem; line-height: 1;
      filter: drop-shadow(0 0 20px rgba(201,168,76,0.3));
      animation: breathe 3.5s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100% { transform: scale(1);    filter: drop-shadow(0 0 16px rgba(201,168,76,0.3)); }
      50%      { transform: scale(1.05); filter: drop-shadow(0 0 40px rgba(224,92,42,0.5)); }
    }
    .reveal-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.2rem, 3.5vw, 1.8rem);
      color: var(--gold);
    }
    .reveal-sub {
      color: var(--text-dim); font-style: italic;
      font-size: 1.05rem; font-weight: 300;
    }
    .reveal-actions {
      display: flex; gap: 0.75rem; flex-wrap: wrap;
      justify-content: center; margin-top: 0.5rem;
    }
  </style>
</head>
<body>
<div class="container">
  <a href="../index.html" class="back-link">← The Hoard</a>
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

  <div id="question-host"></div>

  <div id="screen-reveal">
    <div class="reveal-glyph">🐉</div>
    <div class="reveal-title">Your dragon awaits.</div>
    <div class="reveal-sub">Step through when you're ready.</div>
    <div class="reveal-actions">
      <button class="btn btn--ghost" id="retake-btn">Start Over</button>
      <button class="btn btn--gold" style="font-size:0.88rem;padding:1rem 3.5rem;letter-spacing:0.12em"
              id="reveal-btn">Reveal My Dragon →</button>
    </div>
  </div>
</div>

<script type="module">
const QUESTION_MODULES = [
  './questions/q1_location.js',
  './questions/q2_color.js',
  './questions/q3_eye.js',
  './questions/q4_activity.js',
  './questions/q5_personality.js',
  './questions/q6_pattern_color.js',
];

function setCookie(name, val, days = 365) {
  const d = new Date();
  d.setTime(d.getTime() + days * 86400000);
  document.cookie = `${name}=${encodeURIComponent(val)};expires=${d.toUTCString()};path=/`;
}
function deleteCookie(name) {
  document.cookie = `${name}=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/`;
}

const host     = document.getElementById('question-host');
const reveal   = document.getElementById('screen-reveal');
const progress = document.getElementById('progress');

const answers = { descriptions: [] };
const TOTAL   = QUESTION_MODULES.length + 1;

function setProgress(step) {
  progress.style.width = (step / (TOTAL - 1) * 100) + '%';
}

const modules = await Promise.all(QUESTION_MODULES.map(p => import(p)));

let currentStep = 0;

function showStep(index) {
  host.innerHTML = '';
  currentStep = index;
  setProgress(index);
  window.scrollTo({ top: 0, behavior: 'smooth' });

  if (index >= modules.length) {
    reveal.classList.add('active');
    return;
  }

  reveal.classList.remove('active');

  const mod    = modules[index];
  const screen = document.createElement('div');
  screen.className = 'screen active';

  const qNum = document.createElement('div');
  qNum.className = 'q-number';
  qNum.textContent = `${index + 1} / ${modules.length}`;

  const qText = document.createElement('div');
  qText.className = 'q-text';
  qText.textContent = mod.meta.prompt;

  screen.appendChild(qNum);
  screen.appendChild(qText);

  mod.render(screen, (payload) => {
    const { description, ...rest } = payload;
    Object.assign(answers, rest);
    if (description) answers.descriptions.push(description);
    showStep(index + 1);
  });

  host.appendChild(screen);
}

showStep(0);

document.getElementById('reveal-btn').addEventListener('click', () => {
  setCookie('quiz_dragon_person_01_answers', JSON.stringify(answers));
  setCookie('quiz_dragon_person_01_done', 'true');
  window.location.href = 'result.html';
});

document.getElementById('retake-btn').addEventListener('click', () => {
  deleteCookie('quiz_dragon_person_01_answers');
  deleteCookie('quiz_dragon_person_01_done');
  window.location.reload();
});
</script>
</body>
</html>
