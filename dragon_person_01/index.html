<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What Dragon Are You?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0807;
      --surface: #13100e;
      --border: #3a2e22;
      --gold: #c9a84c;
      --gold-dim: #7a6030;
      --ember: #e05c2a;
      --text: #e8dcc8;
      --text-dim: #8a7a60;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 580px;
      width: 100%;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--gold-dim);
      text-decoration: none;
      font-size: 0.85rem;
      font-family: 'Cinzel Decorative', serif;
      margin-bottom: 2.5rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--gold); }

    .progress-bar {
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 3rem;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold));
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    .question-block {
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .q-number {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.7rem;
      color: var(--gold-dim);
      letter-spacing: 0.15em;
      margin-bottom: 0.75rem;
    }

    .q-text {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 400;
      line-height: 1.3;
      color: var(--text);
      margin-bottom: 2.5rem;
    }

    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .choice-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.1rem 1.2rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: var(--text);
      font-family: 'Crimson Pro', serif;
    }
    .choice-btn:hover {
      border-color: var(--gold-dim);
      background: #1a1410;
      transform: translateY(-2px);
    }
    .choice-btn.selected {
      border-color: var(--gold);
      background: #1e1810;
    }

    .choice-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.1);
    }
    .choice-label {
      font-size: 1.05rem;
      font-weight: 400;
    }
    .choice-sub {
      font-size: 0.8rem;
      color: var(--text-dim);
      font-style: italic;
      margin-top: 0.15rem;
    }

    .submit-row {
      margin-top: 2.5rem;
      text-align: right;
    }

    .submit-btn {
      background: transparent;
      border: 1px solid var(--gold-dim);
      color: var(--gold);
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.85rem;
      padding: 0.75rem 2.5rem;
      border-radius: 3px;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .submit-btn:hover:not(:disabled) {
      background: rgba(201,168,76,0.1);
      border-color: var(--gold);
    }
    .submit-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="../index.html" class="back-link">← The Hoard</a>

    <div class="progress-bar">
      <div class="progress-fill" id="progress" style="width: 0%"></div>
    </div>

    <div class="question-block" id="question-block">
      <div class="q-number">QUESTION 1 OF 1</div>
      <div class="q-text">What color calls to you from deep within the hoard?</div>

      <div class="choices" id="choices"></div>

      <div class="submit-row">
        <button class="submit-btn" id="submit-btn" disabled>Reveal My Dragon →</button>
      </div>
    </div>
  </div>

  <script>
    // ── Color options ───────────────────────────────────────────
    // Add more questions here later — just append to QUESTIONS array
    const QUESTIONS = [
      {
        key: 'color',
        text: 'What color calls to you from deep within the hoard?',
        options: [
          { value: 'crimson',   label: 'Crimson',   sub: 'Fierce & passionate',  hex: '#cc2200' },
          { value: 'gold',      label: 'Gold',      sub: 'Ancient & radiant',    hex: '#c9a84c' },
          { value: 'cobalt',    label: 'Cobalt',    sub: 'Deep & mysterious',    hex: '#1a4fa0' },
          { value: 'emerald',   label: 'Emerald',   sub: 'Wild & verdant',       hex: '#1a7a45' },
          { value: 'amethyst',  label: 'Amethyst',  sub: 'Arcane & dreaming',    hex: '#6b3fa0' },
          { value: 'obsidian',  label: 'Obsidian',  sub: 'Shadow & silence',     hex: '#1a1520' },
          { value: 'ivory',     label: 'Ivory',     sub: 'Pure & untamed',       hex: '#e8dcc8' },
          { value: 'copper',    label: 'Copper',    sub: 'Earthy & ancient',     hex: '#b87333' },
        ]
      }
    ];

    // ── Cookie helpers ──────────────────────────────────────────
    function setCookie(name, value, days = 365) {
      const d = new Date();
      d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
      document.cookie = `${name}=${encodeURIComponent(value)};expires=${d.toUTCString()};path=/`;
    }
    function getCookie(name) {
      const v = document.cookie.split(';').map(c => c.trim()).find(c => c.startsWith(name + '='));
      return v ? decodeURIComponent(v.split('=')[1]) : null;
    }

    // ── Build UI ────────────────────────────────────────────────
    const q = QUESTIONS[0];
    const choices = document.getElementById('choices');
    let selected = null;

    q.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.dataset.value = opt.value;
      btn.dataset.hex = opt.hex;
      btn.innerHTML = `
        <span class="choice-swatch" style="background:${opt.hex}"></span>
        <span>
          <div class="choice-label">${opt.label}</div>
          <div class="choice-sub">${opt.sub}</div>
        </span>
      `;
      btn.addEventListener('click', () => {
        document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selected = { value: opt.value, hex: opt.hex };
        document.getElementById('submit-btn').disabled = false;
      });
      choices.appendChild(btn);
    });

    document.getElementById('progress').style.width = '0%';

    document.getElementById('submit-btn').addEventListener('click', () => {
      if (!selected) return;
      // Save answers as cookie
      const answers = { color: selected.value, colorHex: selected.hex };
      setCookie('quiz_dragon_person_01_answers', JSON.stringify(answers));
      setCookie('quiz_dragon_person_01_done', 'true');
      window.location.href = 'result.html';
    });
  </script>
</body>
</html>
