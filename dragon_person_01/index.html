<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What Dragon Are You?</title>
  <link rel="stylesheet" href="../shared.css">
  <style>
    /* ── Dragon thumbnail grid ─────────────────────────── */
    .dragon-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 0.65rem;
    }
    .dragon-card {
      padding: 0.7rem 0.5rem 0.6rem;
      text-align: center;
    }
    .dragon-thumb {
      width: 72px; height: 72px;
      object-fit: contain;
      margin: 0 auto 0.45rem;
      display: block;
      opacity: 0.75;
      transition: opacity 0.2s;
    }
    .dragon-card:hover .dragon-thumb,
    .dragon-card.selected .dragon-thumb { opacity: 1; }
    .dragon-thumb-placeholder {
      width: 72px; height: 72px;
      margin: 0 auto 0.45rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; opacity: 0.2;
    }
    .dragon-card-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.55rem;
      color: var(--gold-dim);
      letter-spacing: 0.05em;
      line-height: 1.4;
    }
    .dragon-card.selected .dragon-card-name { color: var(--gold); }

    /* ── Color grid ────────────────────────────────────── */
    .color-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 0.65rem;
    }
    .color-card {
      padding: 0.85rem 1rem;
      display: flex; align-items: center; gap: 0.7rem;
    }
    .color-swatch {
      width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.1);
    }
    .color-name { font-size: 0.95rem; line-height: 1.2; }
    .color-sub  { font-size: 0.72rem; color: var(--text-dim); font-style: italic; }

    /* ── Option list (Q3, Q4) ──────────────────────────── */
    .option-list {
      display: flex; flex-direction: column; gap: 0.55rem;
    }
    .option-card {
      padding: 0.9rem 1.2rem;
      display: flex; align-items: baseline; gap: 0.9rem;
    }
    .option-key {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.6rem;
      color: var(--gold-dim);
      letter-spacing: 0.1em;
      flex-shrink: 0;
      width: 1.4rem;
      text-align: right;
      transition: color 0.2s;
    }
    .option-card.selected .option-key { color: var(--gold); }
    .option-label { font-size: 1.05rem; }
    .option-sub   { font-size: 0.78rem; color: var(--text-dim); font-style: italic; margin-top: 0.1rem; }

    /* ── Reveal screen ─────────────────────────────────── */
    #screen-reveal {
      text-align: center;
    }
    .reveal-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      color: var(--gold);
      margin-bottom: 0.75rem;
    }
    .reveal-sub {
      color: var(--text-dim);
      font-style: italic;
      font-size: 1rem;
      margin-bottom: 2.5rem;
      font-weight: 300;
    }
    .reveal-tags {
      display: flex; flex-wrap: wrap;
      justify-content: center; gap: 0.5rem;
      margin-bottom: 2.5rem;
    }
    .tag {
      background: var(--surface);
      border: 1px solid var(--border-bright);
      border-radius: 2px;
      padding: 0.3rem 0.8rem;
      font-size: 0.72rem;
      font-family: 'Cinzel Decorative', serif;
      color: var(--gold-dim);
      letter-spacing: 0.06em;
    }
    .tag .tag-val { color: var(--text-dim); font-family: 'Crimson Pro', serif; font-style: italic; font-size: 0.85rem; letter-spacing: 0; }
  </style>
</head>
<body>
<div class="container">
  <a href="../index.html" class="back-link">← The Hoard</a>
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

  <!-- ── Q1: Dragon species ───────────────────────────────── -->
  <div class="screen active" id="screen-1">
    <div class="q-number">1 / 4</div>
    <div class="q-text">Which dragon do you think is coolest?</div>
    <div class="dragon-grid" id="dragon-grid"></div>
  </div>

  <!-- ── Q2: Color ────────────────────────────────────────── -->
  <div class="screen" id="screen-2">
    <div class="q-number">2 / 4</div>
    <div class="q-text">What color calls to you from deep within the hoard?</div>
    <div class="color-grid" id="color-grid"></div>
  </div>

  <!-- ── Q3: Activity → pattern type ─────────────────────── -->
  <div class="screen" id="screen-3">
    <div class="q-number">3 / 4</div>
    <div class="q-text">Which of these do you enjoy most?</div>
    <div class="option-list" id="activity-list"></div>
  </div>

  <!-- ── Q4: Title → pattern shape value ─────────────────── -->
  <div class="screen" id="screen-4">
    <div class="q-number">4 / 4</div>
    <div class="q-text">Which of these titles do you relate to most?</div>
    <div class="option-list" id="title-list"></div>
  </div>

  <!-- ── Reveal gate ──────────────────────────────────────── -->
  <div class="screen" id="screen-reveal">
    <div class="reveal-title">Your dragon awaits.</div>
    <div class="reveal-sub">All choices made. Step through when you're ready.</div>
    <div class="reveal-tags" id="reveal-tags"></div>
    <div style="display:flex; justify-content:center; gap:0.75rem; flex-wrap:wrap;">
      <button class="btn btn--ghost" id="retake-btn">Start Over</button>
      <button class="btn btn--gold" id="reveal-btn">Reveal My Dragon →</button>
    </div>
  </div>
</div>

<script>
  // ══════════════════════════════════════════════════════════
  //  DATA
  // ══════════════════════════════════════════════════════════

  const DRAGONS = [
    { file: 'b',         label: 'Dragon B'  },
    { file: 'base',      label: 'Base'      },
    { file: 'beta',      label: 'Beta'      },
    { file: 'betab',     label: 'Beta B'    },
    { file: 'c',         label: 'Dragon C'  },
    { file: 'hivewing',  label: 'HiveWing'  },
    { file: 'icewing',   label: 'IceWing'   },
    { file: 'leafwing',  label: 'LeafWing'  },
    { file: 'mudwing',   label: 'MudWing'   },
    { file: 'nightwing', label: 'NightWing' },
    { file: 'rainwing',  label: 'RainWing'  },
    { file: 'sandwing',  label: 'SandWing'  },
    { file: 'seawing',   label: 'SeaWing'   },
    { file: 'seawingb',  label: 'SeaWing B' },
    { file: 'silkwing',  label: 'SilkWing'  },
    { file: 'skywing',   label: 'SkyWing'   },
  ];

  const COLORS = [
    { value: 'crimson',  label: 'Crimson',  sub: 'Fierce & passionate', hex: '#cc2200' },
    { value: 'gold',     label: 'Gold',     sub: 'Ancient & radiant',   hex: '#c9a84c' },
    { value: 'cobalt',   label: 'Cobalt',   sub: 'Deep & mysterious',   hex: '#1a4fa0' },
    { value: 'emerald',  label: 'Emerald',  sub: 'Wild & verdant',      hex: '#1a7a45' },
    { value: 'amethyst', label: 'Amethyst', sub: 'Arcane & dreaming',   hex: '#6b3fa0' },
    { value: 'obsidian', label: 'Obsidian', sub: 'Shadow & silence',    hex: '#2a2535' },
    { value: 'ivory',    label: 'Ivory',    sub: 'Pure & untamed',      hex: '#e8dcc8' },
    { value: 'copper',   label: 'Copper',   sub: 'Earthy & ancient',    hex: '#b87333' },
    { value: 'rose',     label: 'Rose',     sub: 'Soft & deadly',       hex: '#c05080' },
    { value: 'teal',     label: 'Teal',     sub: 'Current & tide',      hex: '#2a9d8f' },
    { value: 'silver',   label: 'Silver',   sub: 'Cold & precise',      hex: '#9ab0c0' },
    { value: 'ochre',    label: 'Ochre',    sub: 'Dusty & ancient',     hex: '#c8860a' },
  ];

  // Activity → pattern type
  // patternType used as seed category in result.html
  const ACTIVITIES = [
    { value: 'running',  label: 'Running',          sub: 'The open road, the wind at your heels', patternType: 'stripes'  },
    { value: 'climbing', label: 'Climbing',          sub: 'Rock and reach, summit in sight',       patternType: 'dots'     },
    { value: 'basking',  label: 'Basking in the sun',sub: 'Still, warm, gloriously unhurried',     patternType: 'blobs'    },
    { value: 'dancing',  label: 'Dancing',           sub: 'Sharp edges, sudden turns',             patternType: 'sharp'    },
    { value: 'singing',  label: 'Singing',           sub: 'A long note unfurling in the air',      patternType: 'twisting' },
    { value: 'surfing',  label: 'Surfing / Skating', sub: 'Ride the rhythm of the world',          patternType: 'waves'    },
    { value: 'sleeping', label: 'Sleeping',          sub: 'Soft, deep, blissfully formless',       patternType: 'softblur' },
  ];

  // Title → pattern seed modifier (0–7)
  const TITLES = [
    { value: 'king',      label: 'King / Queen',  sub: 'Sovereignty flows from you',         seedMod: 0 },
    { value: 'fighter',   label: 'Fighter',       sub: 'Conflict is how you know you\'re alive', seedMod: 1 },
    { value: 'chief',     label: 'Chief',         sub: 'Others follow, without being asked',  seedMod: 2 },
    { value: 'lover',     label: 'Lover',         sub: 'Everything you do, you do with heart', seedMod: 3 },
    { value: 'explorer',  label: 'Explorer',      sub: 'There is always another horizon',     seedMod: 4 },
    { value: 'builder',   label: 'Builder',       sub: 'You see what could be and make it',   seedMod: 5 },
    { value: 'caretaker', label: 'Caretaker',     sub: 'Your strength is given to others',    seedMod: 6 },
    { value: 'collector', label: 'Collector',     sub: 'Every beautiful thing deserves a home', seedMod: 7 },
  ];

  // ══════════════════════════════════════════════════════════
  //  STATE
  // ══════════════════════════════════════════════════════════
  const answers = { dragon: null, color: null, colorHex: null, activity: null, patternType: null, title: null, seedMod: null };
  const SCREENS  = ['screen-1','screen-2','screen-3','screen-4','screen-reveal'];
  let current = 0;

  // ══════════════════════════════════════════════════════════
  //  COOKIES
  // ══════════════════════════════════════════════════════════
  function setCookie(name, val, days = 365) {
    const d = new Date();
    d.setTime(d.getTime() + days * 86400000);
    document.cookie = `${name}=${encodeURIComponent(val)};expires=${d.toUTCString()};path=/`;
  }
  function deleteCookie(name) {
    document.cookie = `${name}=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/`;
  }

  // ══════════════════════════════════════════════════════════
  //  NAVIGATION
  // ══════════════════════════════════════════════════════════
  function goTo(n) {
    document.getElementById(SCREENS[current]).classList.remove('active');
    current = n;
    document.getElementById(SCREENS[current]).classList.add('active');
    // progress: 0 at Q1, 100 at reveal screen
    const pct = (current / (SCREENS.length - 1)) * 100;
    document.getElementById('progress').style.width = pct + '%';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // Auto-advance: call this after each Q is answered
  function advance() {
    if (current < SCREENS.length - 1) goTo(current + 1);
    if (current === SCREENS.length - 1) buildRevealSummary();
  }

  // ══════════════════════════════════════════════════════════
  //  BUILD GRIDS
  // ══════════════════════════════════════════════════════════

  // Q1 — Dragon species
  const dgrid = document.getElementById('dragon-grid');
  DRAGONS.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'choice-card dragon-card';
    btn.innerHTML = `
      <img class="dragon-thumb" src="base/lines/${d.file}.png" alt="${d.label}"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="dragon-thumb-placeholder">🐉</div>
      <div class="dragon-card-name">${d.label}</div>
    `;
    btn.addEventListener('click', () => {
      dgrid.querySelectorAll('.dragon-card').forEach(c => c.classList.remove('selected'));
      btn.classList.add('selected');
      answers.dragon = d.file;
      setTimeout(advance, 180); // tiny delay so selection flash is visible
    });
    dgrid.appendChild(btn);
  });

  // Q2 — Color
  const cgrid = document.getElementById('color-grid');
  COLORS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-card color-card';
    btn.innerHTML = `
      <span class="color-swatch" style="background:${c.hex}"></span>
      <span>
        <div class="color-name">${c.label}</div>
        <div class="color-sub">${c.sub}</div>
      </span>
    `;
    btn.addEventListener('click', () => {
      cgrid.querySelectorAll('.color-card').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      answers.color    = c.value;
      answers.colorHex = c.hex;
      setTimeout(advance, 180);
    });
    cgrid.appendChild(btn);
  });

  // Q3 — Activity
  const alist = document.getElementById('activity-list');
  ACTIVITIES.forEach((a, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-card option-card';
    btn.innerHTML = `
      <span class="option-key">${String.fromCharCode(65+i)}</span>
      <span>
        <div class="option-label">${a.label}</div>
        <div class="option-sub">${a.sub}</div>
      </span>
    `;
    btn.addEventListener('click', () => {
      alist.querySelectorAll('.option-card').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      answers.activity    = a.value;
      answers.patternType = a.patternType;
      setTimeout(advance, 180);
    });
    alist.appendChild(btn);
  });

  // Q4 — Title
  const tlist = document.getElementById('title-list');
  TITLES.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-card option-card';
    btn.innerHTML = `
      <span class="option-key">${String.fromCharCode(65+i)}</span>
      <span>
        <div class="option-label">${t.label}</div>
        <div class="option-sub">${t.sub}</div>
      </span>
    `;
    btn.addEventListener('click', () => {
      tlist.querySelectorAll('.option-card').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      answers.title   = t.value;
      answers.seedMod = t.seedMod;
      setTimeout(advance, 180);
    });
    tlist.appendChild(btn);
  });

  // ══════════════════════════════════════════════════════════
  //  REVEAL SUMMARY
  // ══════════════════════════════════════════════════════════
  const COLOR_LABELS = Object.fromEntries(COLORS.map(c => [c.value, c.label]));

  function buildRevealSummary() {
    const tags = document.getElementById('reveal-tags');
    tags.innerHTML = '';
    const items = [
      { k: 'Dragon',  v: DRAGONS.find(d => d.file === answers.dragon)?.label || answers.dragon },
      { k: 'Color',   v: COLOR_LABELS[answers.color] || answers.color },
      { k: 'Nature',  v: ACTIVITIES.find(a => a.value === answers.activity)?.label || answers.activity },
      { k: 'Title',   v: TITLES.find(t => t.value === answers.title)?.label || answers.title },
    ];
    items.forEach(it => {
      const tag = document.createElement('div');
      tag.className = 'tag';
      tag.innerHTML = `${it.k}: <span class="tag-val">${it.v}</span>`;
      tags.appendChild(tag);
    });
  }

  // ══════════════════════════════════════════════════════════
  //  REVEAL / RETAKE
  // ══════════════════════════════════════════════════════════
  document.getElementById('reveal-btn').addEventListener('click', () => {
    setCookie('quiz_dragon_person_01_answers', JSON.stringify(answers));
    setCookie('quiz_dragon_person_01_done', 'true');
    window.location.href = 'result.html';
  });

  document.getElementById('retake-btn').addEventListener('click', () => {
    deleteCookie('quiz_dragon_person_01_answers');
    deleteCookie('quiz_dragon_person_01_done');
    window.location.reload();
  });
</script>
</body>
</html>
