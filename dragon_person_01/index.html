<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What Dragon Are You?</title>
  <link rel="stylesheet" href="../shared.css">
  <style>
    /* ── Location grid ─────────────────────────────────── */
    .location-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 0.65rem;
    }
    .location-card {
      padding: 1rem 1.1rem;
      display: flex; flex-direction: column;
      align-items: flex-start; gap: 0.2rem;
    }
    .location-emoji { font-size: 1.7rem; margin-bottom: 0.2rem; line-height: 1; }
    .location-name  {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.6rem; color: var(--gold-dim);
      letter-spacing: 0.06em; line-height: 1.4;
    }
    .location-sub   { font-size: 0.78rem; color: var(--text-dim); font-style: italic; }
    .location-card.selected .location-name { color: var(--gold); }

    /* ── Color grid ────────────────────────────────────── */
    .color-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 0.65rem;
    }
    .color-card {
      padding: 0.85rem 1rem;
      display: flex; align-items: center; gap: 0.7rem;
    }
    .color-swatch {
      width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.1);
    }
    .color-name { font-size: 0.95rem; line-height: 1.2; }
    .color-sub  { font-size: 0.72rem; color: var(--text-dim); font-style: italic; }

    /* ── Option list ───────────────────────────────────── */
    .option-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .option-card {
      padding: 0.85rem 1.2rem;
      display: flex; align-items: flex-start; gap: 0.9rem;
    }
    .option-key {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.58rem; color: var(--gold-dim);
      letter-spacing: 0.1em; flex-shrink: 0;
      width: 1.4rem; text-align: right; padding-top: 0.2rem;
      transition: color 0.2s;
    }
    .option-card.selected .option-key { color: var(--gold); }
    .option-label { font-size: 1rem; line-height: 1.35; }
    .option-sub   { font-size: 0.76rem; color: var(--text-dim); font-style: italic; margin-top: 0.15rem; }

    /* ── Reveal screen ─────────────────────────────────── */
    #screen-reveal { text-align: center; padding: 4rem 0; }
    #screen-reveal.screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.25rem; min-height: 60vh; }

    .reveal-glyph {
      font-size: 5.5rem; line-height: 1;
      animation: breathe 3.5s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(201,168,76,0.3));
    }
    @keyframes breathe {
      0%,100% { transform: scale(1);    filter: drop-shadow(0 0 16px rgba(201,168,76,0.3)); }
      50%      { transform: scale(1.05); filter: drop-shadow(0 0 40px rgba(224,92,42,0.5)); }
    }
    .reveal-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.2rem, 3.5vw, 1.8rem);
      color: var(--gold);
    }
    .reveal-sub {
      color: var(--text-dim); font-style: italic;
      font-size: 1.05rem; font-weight: 300;
    }
    .reveal-actions {
      display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center;
      margin-top: 0.5rem;
    }
    .btn--reveal {
      font-size: 0.88rem !important;
      padding: 1rem 3.5rem !important;
      letter-spacing: 0.12em !important;
    }
  </style>
</head>

function setCookie(name, val, days = 365) {
  const d = new Date();
  d.setTime(d.getTime() + days * 86400000);
  document.cookie = `${name}=${encodeURIComponent(val)};expires=${d.toUTCString()};path=/`;
}
function deleteCookie(name) {
  document.cookie = `${name}=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/`;

function goTo(n) {
  document.getElementById(SCREENS[current]).classList.remove('active');
  current = n;
  document.getElementById(SCREENS[current]).classList.add('active');
  document.getElementById('progress').style.width =
    (current / (SCREENS.length - 1) * 100) + '%';

}
function advance() {
  if (current < SCREENS.length - 1) goTo(current + 1);
}

// ══════════════════════════════════════════════════
//  SEEDED PRNG (for eye previews)
// ══════════════════════════════════════════════════
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function strHash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
  return h >>> 0;
}

// ══════════════════════════════════════════════════
//  EYE PREVIEW — mini canvas rendering per style
//  Drawn into a 42×42 canvas thumbnail
// ══════════════════════════════════════════════════
function drawEyePreview(canvas, style) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2, r = Math.min(W,H)/2 - 1;
  ctx.clearRect(0, 0, W, H);

  // Clip to circle
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.clip();

  const rng = mulberry32(strHash(style) ^ 0xdeadbeef);

  switch(style) {
    case 'pink_purple_swirl': {
      const g = ctx.createRadialGradient(cx,cy,0,cx,cy,r);
      g.addColorStop(0,'#ff80c0'); g.addColorStop(0.5,'#c050c0'); g.addColorStop(1,'#6020a0');
      ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
      // swirl lines
      ctx.strokeStyle='rgba(255,200,255,0.5)'; ctx.lineWidth=1.5;
      for(let i=0;i<4;i++){
        ctx.beginPath();
        for(let a=0;a<Math.PI*4;a+=0.1){
          const rad=(a/(Math.PI*4))*r*0.9;
          const px=cx+Math.cos(a+i*1.5)*rad; const py=cy+Math.sin(a+i*1.5)*rad;
          a<0.1?ctx.moveTo(px,py):ctx.lineTo(px,py);
        }
        ctx.stroke();
      }
      break;
    }
    case 'gold_white_swirl': {
      const g = ctx.createRadialGradient(cx,cy,0,cx,cy,r);
      g.addColorStop(0,'#fff8e0'); g.addColorStop(0.5,'#c9a84c'); g.addColorStop(1,'#7a5010');
      ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='rgba(255,255,220,0.6)'; ctx.lineWidth=1.5;
      for(let i=0;i<4;i++){
        ctx.beginPath();
        for(let a=0;a<Math.PI*4;a+=0.1){
          const rad=(a/(Math.PI*4))*r*0.9;
          const px=cx+Math.cos(a+i*1.5)*rad; const py=cy+Math.sin(a+i*1.5)*rad;
          a<0.1?ctx.moveTo(px,py):ctx.lineTo(px,py);
        }
        ctx.stroke();
      }
      break;
    }
    case 'green_gold_split': {
      // Left half green, right half gold
      const gl = ctx.createLinearGradient(0,0,W,0);
      gl.addColorStop(0,'#1a7a30'); gl.addColorStop(0.48,'#1a9a40');
      gl.addColorStop(0.52,'#c9a84c'); gl.addColorStop(1,'#8a6010');
      ctx.fillStyle=gl; ctx.fillRect(0,0,W,H);
      // split line
      ctx.strokeStyle='rgba(255,255,200,0.4)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(cx,0); ctx.lineTo(cx,H); ctx.stroke();
      break;
    }
    case 'purple_blue_blob': {
      ctx.fillStyle='#0a0520'; ctx.fillRect(0,0,W,H);
      // blurry blobs via radial gradients
      [[cx-5,cy-4,'#4020a0'],[cx+4,cy+3,'#1040c0'],[cx,cy,'#6030b0']].forEach(([bx,by,col])=>{
        const bg=ctx.createRadialGradient(bx,by,0,bx,by,r*0.7);
        bg.addColorStop(0,col+'cc'); bg.addColorStop(1,'transparent');
        ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
      });
      break;
    }
    case 'rainbow_swirl': {
      for(let i=0;i<360;i+=3){
        const a1=i*Math.PI/180, a2=(i+3)*Math.PI/180;
        ctx.beginPath(); ctx.moveTo(cx,cy);
        ctx.arc(cx,cy,r,a1,a2); ctx.closePath();
        ctx.fillStyle=`hsl(${i},100%,55%)`; ctx.fill();
      }
      // white swirl overlay
      ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1.2;
      for(let i=0;i<3;i++){
        ctx.beginPath();
        for(let a=0;a<Math.PI*3;a+=0.08){
          const rad=(a/(Math.PI*3))*r*0.85;
          const px=cx+Math.cos(a+i*2.1)*rad; const py=cy+Math.sin(a+i*2.1)*rad;
          a<0.08?ctx.moveTo(px,py):ctx.lineTo(px,py);
        }
        ctx.stroke();
      }
      break;
    }
    case 'cyan_blue_space': {
      ctx.fillStyle='#000820'; ctx.fillRect(0,0,W,H);
      // space blobs
      [[cx-4,cy-4,'#00c0d0'],[cx+5,cy+3,'#0040c0']].forEach(([bx,by,col])=>{
        const bg=ctx.createRadialGradient(bx,by,0,bx,by,r*0.65);
        bg.addColorStop(0,col+'bb'); bg.addColorStop(1,'transparent');
        ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
      });
      // gold sparkles
      ctx.fillStyle='#ffd700';
      for(let i=0;i<8;i++){
        const sx=rng()*W, sy=rng()*H, sr=0.6+rng()*1.2;
        ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fill();
      }
      break;
    }
    case 'black_purple_stripes': {
      ctx.fillStyle='#080510'; ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='#3a1060'; ctx.lineWidth=3;
      for(let i=-W;i<W*2;i+=6){
        ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i+H,H); ctx.stroke();
      }
      break;
    }
    case 'pink_purple_hearts': {
      const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
      g.addColorStop(0,'#ffb0d0'); g.addColorStop(1,'#c060a0');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      // tiny hearts
      ctx.fillStyle='rgba(160,40,120,0.5)';
      [[cx-7,cy-5],[cx+6,cy+4],[cx-2,cy+8]].forEach(([hx,hy])=>{
        const s=3;
        ctx.beginPath();
        ctx.moveTo(hx,hy+s*0.5);
        ctx.bezierCurveTo(hx,hy-s*0.3, hx-s*1.2,hy-s*0.8, hx-s*1.2,hy);
        ctx.bezierCurveTo(hx-s*1.2,hy+s*0.8, hx,hy+s*1.2, hx,hy+s*1.5);
        ctx.bezierCurveTo(hx,hy+s*1.2, hx+s*1.2,hy+s*0.8, hx+s*1.2,hy);
        ctx.bezierCurveTo(hx+s*1.2,hy-s*0.8, hx,hy-s*0.3, hx,hy+s*0.5);
        ctx.fill();
      });
      break;
    }
  }
  ctx.restore();
  // iris ring
  ctx.beginPath(); ctx.arc(cx,cy,r*0.35,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.lineWidth=1.5; ctx.stroke();
  // pupil
  ctx.beginPath(); ctx.arc(cx,cy,r*0.18,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.8)'; ctx.fill();
}

    btn.classList.add('selected');

    answers.colorHex = c.hex;
    setTimeout(advance, 180);
  });
  cgrid.appendChild(btn);
});

// ══════════════════════════════════════════════════
//  BUILD Q3 — eye style list (with mini previews)
// ══════════════════════════════════════════════════
const elist = document.getElementById('eye-list');
EYE_STYLES.forEach((e, i) => {
  const btn = document.createElement('button');
  btn.className = 'choice-card option-card';

  // Build mini preview canvas
  const previewWrap = document.createElement('div');
  previewWrap.style.cssText = 'width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0;border:1px solid var(--border-bright);background:#111;';
  const previewCanvas = document.createElement('canvas');
  previewCanvas.width = 36; previewCanvas.height = 36;
  previewCanvas.style.cssText = 'width:36px;height:36px;';
  previewWrap.appendChild(previewCanvas);

  btn.innerHTML = `
    <span class="option-key">${String.fromCharCode(65+i)}</span>
    <span style="display:flex;align-items:center;gap:0.8rem;flex:1">
      <span>
        <div class="option-label">${e.label}</div>
        <div class="option-sub">${e.sub}</div>
      </span>
    </span>
  `;
  // Insert preview after key
  btn.querySelector('span[style]').prepend(previewWrap);

  // Draw preview after DOM insertion (needs to be visible)
  requestAnimationFrame(() => drawEyePreview(previewCanvas, e.style));

  btn.addEventListener('click', () => {
    elist.querySelectorAll('.option-card').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    answers.eyeStyle = e.style;
    answers.eyeStyleValue = e.value;
    setTimeout(advance, 180);
  });
  elist.appendChild(btn);
});

// ══════════════════════════════════════════════════
//  BUILD Q4 — activity list
// ══════════════════════════════════════════════════
const alist = document.getElementById('activity-list');
ACTIVITIES.forEach((a, i) => {
  const btn = document.createElement('button');
  btn.className = 'choice-card option-card';
  btn.innerHTML = `
    <span class="option-key">${String.fromCharCode(65+i)}</span>
    <span>
      <div class="option-label">${a.label}</div>
      <div class="option-sub">${a.sub}</div>
    </span>
  `;
  btn.addEventListener('click', () => {
    alist.querySelectorAll('.option-card').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    answers.activity    = a.value;
    answers.patternType = a.patternType;
    setTimeout(advance, 180);
  });
  alist.appendChild(btn);
});

// ══════════════════════════════════════════════════
//  BUILD Q5 — personality list
// ══════════════════════════════════════════════════
const plist = document.getElementById('personality-list');
PERSONALITIES.forEach((p, i) => {
  const btn = document.createElement('button');
  btn.className = 'choice-card option-card';
  btn.innerHTML = `
    <span class="option-key">${String.fromCharCode(65+i)}</span>
    <span>
      <div class="option-label">${p.label}</div>
      ${p.sub ? `<div class="option-sub">${p.sub}</div>` : ''}
    </span>
  `;
  btn.addEventListener('click', () => {
    plist.querySelectorAll('.option-card').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    answers.personality = p.value;
    answers.seedMod     = p.seedMod;
    setTimeout(advance, 180);
  });
  plist.appendChild(btn);
});

// ══════════════════════════════════════════════════
//  REVEAL + RETAKE
// ══════════════════════════════════════════════════
document.getElementById('reveal-btn').addEventListener('click', () => {
  setCookie('quiz_dragon_person_01_answers', JSON.stringify(answers));
  setCookie('quiz_dragon_person_01_done', 'true');
  window.location.href = 'result.html';
});

document.getElementById('retake-btn').addEventListener('click', () => {
  deleteCookie('quiz_dragon_person_01_answers');
  deleteCookie('quiz_dragon_person_01_done');
  window.location.reload();
});
</script>
</body>
