<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What Dragon Are You?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0807;
      --surface: #13100e;
      --border: #3a2e22;
      --gold: #c9a84c;
      --gold-dim: #7a6030;
      --ember: #e05c2a;
      --text: #e8dcc8;
      --text-dim: #8a7a60;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .container { max-width: 660px; width: 100%; }
    .back-link {
      display: inline-flex; align-items: center; gap: 0.4rem;
      color: var(--gold-dim); text-decoration: none;
      font-size: 0.85rem; font-family: 'Cinzel Decorative', serif;
      margin-bottom: 2rem; transition: color 0.2s;
    }
    .back-link:hover { color: var(--gold); }
    .progress-bar {
      height: 2px; background: var(--border); border-radius: 2px;
      margin-bottom: 2.5rem; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold));
      border-radius: 2px; transition: width 0.5s ease;
    }
    .screen { display: none; animation: fadeIn 0.4s ease; }
    .screen.active { display: block; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .q-number {
      font-family: 'Cinzel Decorative', serif; font-size: 0.65rem;
      color: var(--gold-dim); letter-spacing: 0.15em; margin-bottom: 0.6rem;
    }
    .q-text {
      font-size: clamp(1.4rem, 4vw, 1.9rem); font-weight: 400;
      line-height: 1.3; margin-bottom: 2rem;
    }
    /* Dragon grid */
    .dragon-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 0.75rem;
    }
    .dragon-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px; padding: 0.75rem; cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      text-align: center; color: var(--text);
      font-family: 'Crimson Pro', serif;
    }
    .dragon-card:hover  { border-color: var(--gold-dim); background: #1a1410; transform: translateY(-2px); }
    .dragon-card.selected { border-color: var(--gold); background: #1e1810; }
    .dragon-preview {
      width: 80px; height: 80px; object-fit: contain;
      margin: 0 auto 0.5rem; display: block;
    }
    .dragon-placeholder {
      width: 80px; height: 80px; margin: 0 auto 0.5rem;
      display: none; align-items: center; justify-content: center;
      font-size: 2.2rem; opacity: 0.25;
    }
    .dragon-card-name {
      font-family: 'Cinzel Decorative', serif; font-size: 0.58rem;
      color: var(--gold); letter-spacing: 0.04em; line-height: 1.4;
    }
    /* Color grid */
    .color-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.75rem;
    }
    .color-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px; padding: 0.9rem 1rem; cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      display: flex; align-items: center; gap: 0.7rem;
      color: var(--text); font-family: 'Crimson Pro', serif;
    }
    .color-card:hover   { border-color: var(--gold-dim); background: #1a1410; transform: translateY(-2px); }
    .color-card.selected { border-color: var(--gold); background: #1e1810; }
    .color-swatch {
      width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.12);
    }
    .color-name { font-size: 0.95rem; }
    .color-sub  { font-size: 0.75rem; color: var(--text-dim); font-style: italic; margin-top: 0.1rem; }
    /* Nav */
    .nav-row {
      margin-top: 2rem; display: flex;
      justify-content: space-between; align-items: center;
    }
    .btn {
      border-radius: 3px; cursor: pointer;
      font-family: 'Cinzel Decorative', serif; font-size: 0.78rem;
      padding: 0.65rem 1.8rem; letter-spacing: 0.08em;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      background: transparent;
    }
    .btn-primary { border: 1px solid var(--gold-dim); color: var(--gold); }
    .btn-primary:hover:not(:disabled) { background: rgba(201,168,76,0.1); border-color: var(--gold); }
    .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-ghost  { border: 1px solid var(--border); color: var(--text-dim); }
    .btn-ghost:hover { border-color: var(--gold-dim); color: var(--text); }
    .invisible  { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
<div class="container">
  <a href="../index.html" class="back-link">← The Hoard</a>
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

  <!-- Q1 -->
  <div class="screen active" id="screen-1">
    <div class="q-number">QUESTION 1 OF 2</div>
    <div class="q-text">Which dragon do you think is coolest?</div>
    <div class="dragon-grid" id="dragon-grid"></div>
    <div class="nav-row">
      <span></span>
      <button class="btn btn-primary" id="q1-next" disabled>Next →</button>
    </div>
  </div>

  <!-- Q2 -->
  <div class="screen" id="screen-2">
    <div class="q-number">QUESTION 2 OF 2</div>
    <div class="q-text">What color calls to you from deep within the hoard?</div>
    <div class="color-grid" id="color-grid"></div>
    <div class="nav-row">
      <button class="btn btn-ghost" id="q2-back">← Back</button>
      <button class="btn btn-primary" id="q2-submit" disabled>Reveal My Dragon →</button>
    </div>
  </div>
</div>

<script>
  const DRAGONS = [
    { file: 'b',         label: 'Dragon B'  },
    { file: 'base',      label: 'Base'      },
    { file: 'beta',      label: 'Beta'      },
    { file: 'betab',     label: 'Beta B'    },
    { file: 'c',         label: 'Dragon C'  },
    { file: 'hivewing',  label: 'HiveWing'  },
    { file: 'icewing',   label: 'IceWing'   },
    { file: 'leafwing',  label: 'LeafWing'  },
    { file: 'mudwing',   label: 'MudWing'   },
    { file: 'nightwing', label: 'NightWing' },
    { file: 'rainwing',  label: 'RainWing'  },
    { file: 'sandwing',  label: 'SandWing'  },
    { file: 'seawing',   label: 'SeaWing'   },
    { file: 'seawingb',  label: 'SeaWing B' },
    { file: 'silkwing',  label: 'SilkWing'  },
    { file: 'skywing',   label: 'SkyWing'   },
  ];

  const COLORS = [
    { value: 'crimson',  label: 'Crimson',  sub: 'Fierce & passionate', hex: '#cc2200' },
    { value: 'gold',     label: 'Gold',     sub: 'Ancient & radiant',   hex: '#c9a84c' },
    { value: 'cobalt',   label: 'Cobalt',   sub: 'Deep & mysterious',   hex: '#1a4fa0' },
    { value: 'emerald',  label: 'Emerald',  sub: 'Wild & verdant',      hex: '#1a7a45' },
    { value: 'amethyst', label: 'Amethyst', sub: 'Arcane & dreaming',   hex: '#6b3fa0' },
    { value: 'obsidian', label: 'Obsidian', sub: 'Shadow & silence',    hex: '#2a2535' },
    { value: 'ivory',    label: 'Ivory',    sub: 'Pure & untamed',      hex: '#e8dcc8' },
    { value: 'copper',   label: 'Copper',   sub: 'Earthy & ancient',    hex: '#b87333' },
    { value: 'rose',     label: 'Rose',     sub: 'Soft & deadly',       hex: '#c05080' },
    { value: 'teal',     label: 'Teal',     sub: 'Current & tide',      hex: '#2a9d8f' },
    { value: 'silver',   label: 'Silver',   sub: 'Cold & precise',      hex: '#9ab0c0' },
    { value: 'ochre',    label: 'Ochre',    sub: 'Dusty & ancient',     hex: '#c8860a' },
  ];

  function setCookie(name, val, days = 365) {
    const d = new Date();
    d.setTime(d.getTime() + days * 86400000);
    document.cookie = `${name}=${encodeURIComponent(val)};expires=${d.toUTCString()};path=/`;
  }

  let selectedDragon = null;
  let selectedColor  = null;

  // Build dragon grid
  const dgrid = document.getElementById('dragon-grid');
  DRAGONS.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'dragon-card';
    btn.innerHTML = `
      <img class="dragon-preview" src="base/lines/${d.file}.png" alt="${d.label}"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="dragon-placeholder">🐉</div>
      <div class="dragon-card-name">${d.label}</div>
    `;
    btn.addEventListener('click', () => {
      dgrid.querySelectorAll('.dragon-card').forEach(c => c.classList.remove('selected'));
      btn.classList.add('selected');
      selectedDragon = d.file;
      document.getElementById('q1-next').disabled = false;
    });
    dgrid.appendChild(btn);
  });

  // Build color grid
  const cgrid = document.getElementById('color-grid');
  COLORS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'color-card';
    btn.innerHTML = `
      <span class="color-swatch" style="background:${c.hex}"></span>
      <span>
        <div class="color-name">${c.label}</div>
        <div class="color-sub">${c.sub}</div>
      </span>
    `;
    btn.addEventListener('click', () => {
      cgrid.querySelectorAll('.color-card').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedColor = { value: c.value, hex: c.hex };
      document.getElementById('q2-submit').disabled = false;
    });
    cgrid.appendChild(btn);
  });

  // Navigation
  let current = 0;
  const screens = ['screen-1', 'screen-2'];
  function goTo(n) {
    document.getElementById(screens[current]).classList.remove('active');
    current = n;
    document.getElementById(screens[current]).classList.add('active');
    document.getElementById('progress').style.width = `${(current / (screens.length - 1)) * 100}%`;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  document.getElementById('q1-next').addEventListener('click', () => { if (selectedDragon) goTo(1); });
  document.getElementById('q2-back').addEventListener('click', () => goTo(0));
  document.getElementById('q2-submit').addEventListener('click', () => {
    if (!selectedDragon || !selectedColor) return;
    const answers = { dragon: selectedDragon, color: selectedColor.value, colorHex: selectedColor.hex };
    setCookie('quiz_dragon_person_01_answers', JSON.stringify(answers));
    setCookie('quiz_dragon_person_01_done', 'true');
    window.location.href = 'result.html';
  });
</script>
</body>
</html>
