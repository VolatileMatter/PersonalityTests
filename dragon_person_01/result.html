<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Dragon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0807;
      --surface: #13100e;
      --border: #3a2e22;
      --gold: #c9a84c;
      --gold-dim: #7a6030;
      --text: #e8dcc8;
      --text-dim: #8a7a60;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Crimson Pro', serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 2rem 1rem;
    }
    .container { max-width: 520px; width: 100%; text-align: center; }
    .back-link {
      display: inline-flex; align-items: center; gap: 0.4rem;
      color: var(--gold-dim); text-decoration: none;
      font-size: 0.85rem; font-family: 'Cinzel Decorative', serif;
      margin-bottom: 2rem; transition: color 0.2s;
    }
    .back-link:hover { color: var(--gold); }

    /* ── Dragon display ── */
    .dragon-frame {
      position: relative; display: inline-block;
      margin-bottom: 2rem;
    }
    .dragon-frame::before {
      content: '';
      position: absolute; inset: -24px; border-radius: 50%;
      background: radial-gradient(ellipse at center, var(--glow-color, rgba(201,168,76,0.15)), transparent 70%);
      pointer-events: none;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 0.6; transform: scale(1); }
      50%      { opacity: 1;   transform: scale(1.06); }
    }

    #output-canvas {
      max-width: 340px; width: 100%; height: auto;
      display: none;
      animation: float 5s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }

    .loading-msg {
      width: 200px; height: 200px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 0.75rem;
      color: var(--text-dim); font-style: italic; font-size: 0.9rem;
    }
    .spinner {
      width: 32px; height: 32px; border-radius: 50%;
      border: 2px solid var(--border);
      border-top-color: var(--gold-dim);
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      width: 240px; padding: 1rem;
      color: var(--text-dim); font-style: italic; font-size: 0.85rem;
      border: 1px solid var(--border); border-radius: 4px;
      display: none; line-height: 1.5;
    }

    /* ── Name / info ── */
    .dragon-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      color: var(--gold); margin-bottom: 0.4rem;
      text-shadow: 0 0 30px rgba(201,168,76,0.3);
    }
    .dragon-subtitle {
      font-style: italic; font-weight: 300;
      color: var(--text-dim); font-size: 1.05rem; margin-bottom: 2rem;
    }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    .btn {
      border-radius: 3px; cursor: pointer;
      font-family: 'Cinzel Decorative', serif; font-size: 0.78rem;
      padding: 0.7rem 1.8rem; letter-spacing: 0.08em;
      text-decoration: none; display: inline-block;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      background: transparent;
    }
    .btn-primary { border: 1px solid var(--gold-dim); color: var(--gold); }
    .btn-primary:hover { background: rgba(201,168,76,0.1); border-color: var(--gold); }
    .btn-ghost   { border: 1px solid var(--border); color: var(--text-dim); }
    .btn-ghost:hover { border-color: var(--gold-dim); color: var(--text); }
    .btn-download {
      border: 1px solid #2a9d8f; color: #2a9d8f;
      display: none; /* shown once canvas is ready */
    }
    .btn-download:hover { background: rgba(42,157,143,0.1); border-color: #3dbdb0; }
  </style>
</head>
<body>
<div class="container">
  <a href="../index.html" class="back-link">← The Hoard</a>

  <div class="dragon-frame" id="dragon-frame">
    <div class="loading-msg" id="loading-msg">
      <div class="spinner"></div>
      <span>Summoning your dragon…</span>
    </div>
    <div class="error-msg" id="error-msg"></div>
    <canvas id="output-canvas"></canvas>
  </div>

  <div class="dragon-name"    id="dragon-name"></div>
  <div class="dragon-subtitle" id="dragon-subtitle"></div>

  <div class="btn-row">
    <button class="btn btn-download" id="download-btn">⬇ Download PNG</button>
    <a href="index.html" class="btn btn-ghost" id="retake-btn">Retake Quiz</a>
    <a href="../index.html" class="btn btn-primary">Back to Hoard</a>
  </div>
</div>

<script>
  // ── Dragon metadata ──────────────────────────────────────────
  const DRAGON_INFO = {
    b:         { name: 'Dragon B',    subtitle: 'Of the Unknown Lineage' },
    base:      { name: 'The Base',    subtitle: 'Origin of All Dragons'  },
    beta:      { name: 'Beta',        subtitle: 'First of the Tested'    },
    betab:     { name: 'Beta B',      subtitle: 'The Second Trial'       },
    c:         { name: 'Dragon C',    subtitle: 'The Third Form'         },
    hivewing:  { name: 'HiveWing',    subtitle: 'Weaver of the Colony'   },
    icewing:   { name: 'IceWing',     subtitle: 'Born of Eternal Winter' },
    leafwing:  { name: 'LeafWing',    subtitle: 'Guardian of the Grove'  },
    mudwing:   { name: 'MudWing',     subtitle: 'Strength of the Delta'  },
    nightwing: { name: 'NightWing',   subtitle: 'Reader of Futures'      },
    rainwing:  { name: 'RainWing',    subtitle: 'Living Prism'           },
    sandwing:  { name: 'SandWing',    subtitle: 'Sovereign of the Dunes' },
    seawing:   { name: 'SeaWing',     subtitle: 'Voice of the Deep'      },
    seawingb:  { name: 'SeaWing B',   subtitle: 'Tide Caller'            },
    silkwing:  { name: 'SilkWing',    subtitle: 'Dreamer on the Wind'    },
    skywing:   { name: 'SkyWing',     subtitle: 'Sovereign of the Flame' },
  };

  const COLOR_GLOW = {
    crimson:  'rgba(204,34,0,0.22)',
    gold:     'rgba(201,168,76,0.22)',
    cobalt:   'rgba(26,79,160,0.22)',
    emerald:  'rgba(26,122,69,0.22)',
    amethyst: 'rgba(107,63,160,0.22)',
    obsidian: 'rgba(80,60,100,0.18)',
    ivory:    'rgba(232,220,200,0.18)',
    copper:   'rgba(184,115,51,0.22)',
    rose:     'rgba(192,80,128,0.22)',
    teal:     'rgba(42,157,143,0.22)',
    silver:   'rgba(154,176,192,0.22)',
    ochre:    'rgba(200,134,10,0.22)',
  };

  // ── Cookie helpers ──────────────────────────────────────────
  function getCookie(name) {
    const v = document.cookie.split(';').map(c => c.trim()).find(c => c.startsWith(name + '='));
    return v ? decodeURIComponent(v.split('=')[1]) : null;
  }
  function deleteCookie(name) {
    document.cookie = `${name}=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/`;
  }

  // ── Image loader ────────────────────────────────────────────
  function loadImage(src) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload  = () => resolve(img);
      img.onerror = () => reject(new Error(`Failed to load: ${src}`));
      img.src = src;
    });
  }

  // ── Flat recolor (all pixels alpha > 50 → target hex, preserve alpha) ──
  function flatRecolor(imageData, hex) {
    const tr = parseInt(hex.slice(1,3), 16);
    const tg = parseInt(hex.slice(3,5), 16);
    const tb = parseInt(hex.slice(5,7), 16);
    const d = imageData.data;
    for (let i = 0; i < d.length; i += 4) {
      if (d[i+3] <= 50) continue;
      d[i]   = tr;
      d[i+1] = tg;
      d[i+2] = tb;
      // alpha untouched
    }
    return imageData;
  }

  // ── Main ────────────────────────────────────────────────────
  const raw = getCookie('quiz_dragon_person_01_answers');
  if (!raw) { window.location.href = 'index.html'; }

  const answers   = JSON.parse(raw);
  const dragonKey = answers.dragon;
  const colorHex  = answers.colorHex;
  const colorKey  = answers.color;
  const dragonInfo = DRAGON_INFO[dragonKey] || { name: dragonKey, subtitle: 'Of Ancient Lineage' };

  // Set name / subtitle
  document.getElementById('dragon-name').textContent     = dragonInfo.name;
  document.getElementById('dragon-subtitle').textContent = dragonInfo.subtitle;

  // Set glow color
  document.getElementById('dragon-frame').style.setProperty(
    '--glow-color', COLOR_GLOW[colorKey] || 'rgba(201,168,76,0.2)'
  );

  // Image paths
  const clippingPath = `base/clipping/${dragonKey}.png`;
  const linesPath    = `base/lines/${dragonKey}.png`;

  const canvas = document.getElementById('output-canvas');
  const ctx    = canvas.getContext('2d');

  function showError(msg) {
    document.getElementById('loading-msg').style.display = 'none';
    const el = document.getElementById('error-msg');
    el.style.display = 'block';
    el.innerHTML = `🐉<br>${msg}`;
  }

  Promise.all([loadImage(clippingPath), loadImage(linesPath)])
    .then(([clippingImg, linesImg]) => {
      // Use the larger of the two as canvas size (should be same)
      canvas.width  = Math.max(clippingImg.naturalWidth,  linesImg.naturalWidth);
      canvas.height = Math.max(clippingImg.naturalHeight, linesImg.naturalHeight);

      // ── Layer 1: clipping — flat recolored ─────────────────
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(clippingImg, 0, 0);

      const clippingData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      flatRecolor(clippingData, colorHex);
      ctx.putImageData(clippingData, 0, 0);

      // ── Layer 2: lineart at 75% opacity on top ─────────────
      ctx.globalAlpha = 0.75;
      ctx.drawImage(linesImg, 0, 0);
      ctx.globalAlpha = 1.0;

      // Show canvas, hide spinner
      document.getElementById('loading-msg').style.display = 'none';
      canvas.style.display = 'block';
      document.getElementById('download-btn').style.display = 'inline-block';
    })
    .catch(err => {
      console.error(err);
      showError(`Couldn't load dragon files.<br><small>${err.message}</small>`);
    });

  // ── Download ────────────────────────────────────────────────
  document.getElementById('download-btn').addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = `${dragonKey}_${colorKey}_dragon.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  });

  // ── Retake ──────────────────────────────────────────────────
  document.getElementById('retake-btn').addEventListener('click', e => {
    e.preventDefault();
    deleteCookie('quiz_dragon_person_01_answers');
    deleteCookie('quiz_dragon_person_01_done');
    window.location.href = 'index.html';
  });
</script>
</body>
</html>
