<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Dragon</title>
  <link rel="stylesheet" href="../shared.css">
  <style>
    body { justify-content: flex-start; padding-top: 3rem; }
    .page { display: flex; flex-direction: column; align-items: center; text-align: center; width: 100%; }

    .dragon-frame {
      position: relative; display: inline-block; margin-bottom: 2rem;
    }
    .dragon-frame::before {
      content: '';
      position: absolute; inset: -32px; border-radius: 50%;
      background: radial-gradient(ellipse, var(--glow, rgba(201,168,76,0.15)), transparent 65%);
      pointer-events: none;
      animation: pulse-glow 3.5s ease-in-out infinite;
    }
    #output-canvas {
      max-width: 420px; width: 100%; height: auto;
      display: none; animation: float 5s ease-in-out infinite;
    }
    .loading-msg {
      width: 240px; height: 240px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 0.8rem;
      color: var(--text-dim); font-style: italic; font-size: 0.9rem;
    }
    .error-msg {
      width: 280px; padding: 1.5rem;
      border: 1px solid var(--border); border-radius: 4px;
      color: var(--text-dim); font-style: italic;
      font-size: 0.85rem; line-height: 1.7; display: none;
    }

    /* ── Name / subtitle ─────────────────────────── */
    .dragon-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.5rem, 5vw, 2.3rem); color: var(--gold);
      text-shadow: 0 0 30px rgba(201,168,76,0.25);
      margin-bottom: 0.35rem;
    }
    .dragon-subtitle {
      font-style: italic; font-weight: 300;
      color: var(--text-dim); font-size: 1rem; margin-bottom: 2rem;
    }

    /* ── Descriptions ────────────────────────────── */
    .descriptions {
      max-width: 420px; width: 100%;
      display: flex; flex-direction: column; gap: 0.6rem;
      margin-bottom: 2rem;
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
    }
    .desc-line {
      font-size: 0.95rem; color: var(--text-dim);
      font-style: italic; line-height: 1.5;
      padding-left: 1rem;
      border-left: 2px solid var(--border-bright);
      text-align: left;
    }

    /* ── Buttons ─────────────────────────────────── */
    .btn-row {
      display: flex; gap: 0.75rem;
      justify-content: center; flex-wrap: wrap; margin-bottom: 3rem;
    }
  </style>
</head>
<body>
<div class="page container--sm">
  <a href="../index.html" class="back-link">← The Hoard</a>

  <div class="dragon-frame" id="dragon-frame">
    <div class="loading-msg" id="loading-msg">
      <div class="spinner"></div>
      <span>Summoning your dragon…</span>

    <div class="error-msg" id="error-msg"></div>

  <div class="dragon-name"     id="dragon-name"></div>
  <div class="dragon-subtitle" id="dragon-subtitle"></div>

  <div class="btn-row">
    <button class="btn btn--teal"  id="download-btn" style="display:none">⬇ Download PNG</button>
    <button class="btn btn--ghost" id="retake-btn">Retake Quiz</button>
    <a href="../index.html"        class="btn btn--gold">← The Hoard</a>

</div>

<script type="module">
// ══════════════════════════════════════════════════════════════
//  METADATA
// ══════════════════════════════════════════════════════════════

const COLOR_GLOW = {
  crimson:'rgba(204,34,0,0.22)',   gold:'rgba(201,168,76,0.22)',
  cobalt:'rgba(26,79,160,0.22)',   emerald:'rgba(26,122,69,0.22)',
  amethyst:'rgba(107,63,160,0.22)', ivory:'rgba(232,220,200,0.15)',
  copper:'rgba(184,115,51,0.22)',  rose:'rgba(192,80,128,0.22)',
  teal:'rgba(42,157,143,0.22)',    silver:'rgba(154,176,192,0.22)',
  ochre:'rgba(200,134,10,0.22)',

// ══════════════════════════════════════════════════════════════
//  COOKIES
// ══════════════════════════════════════════════════════════════
function getCookie(name) {
  const v = document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith(name+'='));
  return v ? decodeURIComponent(v.split('=')[1]) : null;
}
function deleteCookie(name) {
  document.cookie=`${name}=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/`;
}

// ══════════════════════════════════════════════════════════════
//  SEEDED PRNG
// ══════════════════════════════════════════════════════════════
function mulberry32(seed) {
  return function() {
    seed|=0; seed=seed+0x6D2B79F5|0;
    let t=Math.imul(seed^seed>>>15,1|seed);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return((t^t>>>14)>>>0)/4294967296;
  };
}
function strHash(s) {
  let h=0;
  for(let i=0;i<s.length;i++) h=(Math.imul(31,h)+s.charCodeAt(i))|0;
  return h>>>0;
}

// ══════════════════════════════════════════════════════════════
//  COLOR HELPERS
// ══════════════════════════════════════════════════════════════
function hexToRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function rgbToHsv(r,g,b){
  r/=255;g/=255;b/=255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;
  let h=0,s=mx===0?0:d/mx,v=mx;
  if(d!==0){switch(mx){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break;}}
  return[h,s,v];
}
function hsvToRgb(h,s,v){
  const i=Math.floor(h*6),f=h*6-i,p=v*(1-s),q=v*(1-f*s),t=v*(1-(1-f)*s);
  let r,g,b;
  switch(i%6){case 0:r=v;g=t;b=p;break;case 1:r=q;g=v;b=p;break;case 2:r=p;g=v;b=t;break;case 3:r=p;g=q;b=v;break;case 4:r=t;g=p;b=v;break;case 5:r=v;g=p;b=q;break;}
  return[Math.round(r*255),Math.round(g*255),Math.round(b*255)];
}

// Flat recolor: all visible pixels → target hex, preserve alpha
function flatRecolor(imageData, hex) {
  const[tr,tg,tb]=hexToRgb(hex), d=imageData.data;
  for(let i=0;i<d.length;i+=4){
    if(d[i+3]<=50)continue;
    d[i]=tr;d[i+1]=tg;d[i+2]=tb;
  }
  return imageData;
}

// ══════════════════════════════════════════════════════════════
//  LINEART RECOLOR — per-pixel sampling from composited base
//
//  For each lineart pixel with alpha > 50:
//    • Sample the pixel at the same (x,y) in the composited base
//    • If base pixel has alpha > 50:
//        Take base RGB → HSV
//        Increase S by 40% (clamp 1.0)   → more saturated
//        Decrease V by 55% (clamp 0.0)   → much darker
//        Write that color to lineart pixel
//    • Else (no base beneath):
//        Write pure black (0,0,0)
//  Alpha of lineart pixel is preserved throughout.
// ══════════════════════════════════════════════════════════════
function recolorLineartFromBase(lineData, baseData) {
  const ld = lineData.data;
  const bd = baseData.data;
  for (let i = 0; i < ld.length; i += 4) {
    if (ld[i+3] <= 50) continue; // transparent lineart pixel — skip

    if (bd[i+3] <= 50) {
      // No base beneath — flat black
      ld[i]=0; ld[i+1]=0; ld[i+2]=0;
    } else {
      // Sample base color, darken + saturate
      const [h, s, v] = rgbToHsv(bd[i], bd[i+1], bd[i+2]);
      const ns = Math.min(s + 0.4, 1.0);  // boost saturation
      const nv = Math.max(v - 0.55, 0.0); // crush brightness
      const [nr, ng, nb] = hsvToRgb(h, ns, nv);
      ld[i]=nr; ld[i+1]=ng; ld[i+2]=nb;
    }
    // alpha untouched
  }
  return lineData;
}

// ══════════════════════════════════════════════════════════════
//  EYE LAYER — imported from q3 to avoid duplication
//  We re-implement drawEyeLayer inline here since result.html
//  is a plain module and q3_eye.js exports render(), not the fn.
//  (The draw logic is small enough to duplicate.)
// ══════════════════════════════════════════════════════════════
function drawEyeLayer(ctx, W, H, style, rng) {
  // Draws eye art filling the full canvas (W×H).
  // Caller is responsible for masking to EYEBALL.png alpha afterward.
  const cx=W/2, cy=H/2, r=Math.min(W,H)*0.48;
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();

  // Helper: draw a spiral arm starting from center, no stray line to (0,0)
  function spiral(offsetAngle, jitter) {
    ctx.beginPath();
    let first=true;
    for(let a=0.01; a<Math.PI*6; a+=0.05) {
      const rad=(a/(Math.PI*6))*r*0.95;
      const jx = jitter ? (rng()-0.5)*rad*0.15 : 0;
      const jy = jitter ? (rng()-0.5)*rad*0.15 : 0;
      const px=cx+Math.cos(a+offsetAngle)*rad+jx;
      const py=cy+Math.sin(a+offsetAngle)*rad+jy;
      first ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
      first=false;
    }
    ctx.stroke();
  }

  switch(style) {
    case 'pink_purple_swirl': {
      const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
      g.addColorStop(0,'#ff80c0'); g.addColorStop(0.5,'#c050c0'); g.addColorStop(1,'#5010a0');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='rgba(255,200,255,0.45)'; ctx.lineWidth=Math.max(2,W*0.015);
      for(let i=0;i<5;i++) spiral(i*1.26, true);
      break;
    }
    case 'gold_white_swirl': {
      const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
      g.addColorStop(0,'#fffce0'); g.addColorStop(0.4,'#e8c060'); g.addColorStop(1,'#7a5010');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='rgba(255,255,230,0.55)'; ctx.lineWidth=Math.max(2,W*0.015);
      for(let i=0;i<5;i++) spiral(i*1.26, false);
      break;
    }
    case 'green_gold_split': {
      const gl=ctx.createLinearGradient(0,0,W,0);
      gl.addColorStop(0,'#0a5020'); gl.addColorStop(0.46,'#1a9a40');
      gl.addColorStop(0.54,'#c9a84c'); gl.addColorStop(1,'#6a4008');
      ctx.fillStyle=gl; ctx.fillRect(0,0,W,H);
      const sl=ctx.createLinearGradient(cx-4,0,cx+4,0);
      sl.addColorStop(0,'rgba(255,255,200,0)'); sl.addColorStop(0.5,'rgba(255,255,200,0.35)'); sl.addColorStop(1,'rgba(255,255,200,0)');
      ctx.fillStyle=sl; ctx.fillRect(cx-4,0,8,H);
      break;
    }
    case 'purple_blue_blob': {
      ctx.fillStyle='#050312'; ctx.fillRect(0,0,W,H);
      [[cx-r*0.2,cy-r*0.15,'#4020a0'],[cx+r*0.2,cy+r*0.1,'#1040c0'],[cx,cy,'#5530b0']].forEach(([bx,by,c])=>{
        const bg=ctx.createRadialGradient(bx,by,0,bx,by,r*(0.5+rng()*0.3));
        bg.addColorStop(0,c+'dd'); bg.addColorStop(1,'transparent');
        ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
      });
      break;
    }
    case 'rainbow_swirl': {
      for(let i=0;i<360;i+=2) {
        ctx.beginPath(); ctx.moveTo(cx,cy);
        ctx.arc(cx,cy,r,i*Math.PI/180,(i+2)*Math.PI/180); ctx.closePath();
        ctx.fillStyle=`hsl(${i},100%,55%)`; ctx.fill();
      }
      ctx.strokeStyle='rgba(255,255,255,0.38)'; ctx.lineWidth=Math.max(1.5,W*0.012);
      for(let i=0;i<4;i++) {
        ctx.beginPath();
        let first=true;
        for(let a=0.01;a<Math.PI*4;a+=0.05){
          const rad=(a/(Math.PI*4))*r*0.9;
          const px=cx+Math.cos(a+i*1.57)*rad, py=cy+Math.sin(a+i*1.57)*rad;
          first ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
          first=false;
        }
        ctx.stroke();
      }
      break;
    }
    case 'cyan_blue_space': {
      ctx.fillStyle='#000c20'; ctx.fillRect(0,0,W,H);
      [[cx-r*0.15,cy-r*0.1,'#00b0c8'],[cx+r*0.2,cy+r*0.15,'#1030c0'],[cx-r*0.1,cy+r*0.2,'#0080b0']].forEach(([bx,by,c])=>{
        const bg=ctx.createRadialGradient(bx,by,0,bx,by,r*(0.45+rng()*0.25));
        bg.addColorStop(0,c+'cc'); bg.addColorStop(1,'transparent');
        ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
      });
      ctx.fillStyle='#ffd700';
      for(let i=0;i<14;i++){
        const sx=rng()*W, sy=rng()*H, sr=0.5+rng()*Math.max(1.5,W*0.008);
        ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fill();
        if(sr>W*0.006){
          ctx.strokeStyle='rgba(255,215,0,0.6)'; ctx.lineWidth=0.5;
          ctx.beginPath(); ctx.moveTo(sx-sr*2,sy); ctx.lineTo(sx+sr*2,sy); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(sx,sy-sr*2); ctx.lineTo(sx,sy+sr*2); ctx.stroke();
        }
      }
      break;
    }
    case 'black_purple_stripes': {
      ctx.fillStyle='#06030f'; ctx.fillRect(0,0,W,H);
      const sw=Math.max(4,W*0.06); ctx.strokeStyle='#3a0878'; ctx.lineWidth=sw*0.6;
      for(let i=-W;i<W*2;i+=sw*1.6){
        ctx.beginPath(); ctx.moveTo(i,-H*0.1); ctx.lineTo(i+H*1.2,H*1.1); ctx.stroke();
      }
      const sg=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
      sg.addColorStop(0,'rgba(80,0,160,0.2)'); sg.addColorStop(1,'transparent');
      ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);
      break;
    }
    case 'pink_purple_hearts': {
      const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
      g.addColorStop(0,'#ffc0d8'); g.addColorStop(1,'#c060a0');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      const hs=Math.max(8,W*0.09); ctx.fillStyle='rgba(140,20,100,0.45)';
      [[cx-r*0.3,cy-r*0.2],[cx+r*0.28,cy+r*0.15],[cx-r*0.05,cy+r*0.3],[cx+r*0.1,cy-r*0.35]].forEach(([hx,hy])=>{
        const s=hs*(0.7+rng()*0.6); ctx.beginPath();
        ctx.moveTo(hx,hy+s*0.4);
        ctx.bezierCurveTo(hx,hy-s*0.2,hx-s,hy-s*0.6,hx-s,hy);
        ctx.bezierCurveTo(hx-s,hy+s*0.7,hx,hy+s*1.1,hx,hy+s*1.3);
        ctx.bezierCurveTo(hx,hy+s*1.1,hx+s,hy+s*0.7,hx+s,hy);
        ctx.bezierCurveTo(hx+s,hy-s*0.6,hx,hy-s*0.2,hx,hy+s*0.4);
        ctx.fill();
      });
      break;
    }
  }
  ctx.restore();
}

// ══════════════════════════════════════════════════════════════
//  BODY PATTERN GENERATORS
// ══════════════════════════════════════════════════════════════
function patternStripes(ctx,W,H,rng,mod){const c=6+Math.floor(rng()*8)+mod,sw=W/(c*2),a=(rng()*40-20)*Math.PI/180;ctx.save();ctx.translate(W/2,H/2);ctx.rotate(a);ctx.translate(-W,-H);ctx.fillStyle='rgba(0,0,0,0.55)';for(let i=0;i<c*4;i+=2){ctx.fillRect(i*sw-W/2,-H,sw*(0.5+rng()*0.8),H*3);}ctx.restore();}
function patternDots(ctx,W,H,rng,mod){ctx.fillStyle='rgba(0,0,0,0.6)';for(let i=0;i<30+mod*8;i++){ctx.beginPath();ctx.arc(rng()*W,rng()*H,4+rng()*(8+mod*2),0,Math.PI*2);ctx.fill();}}
function patternBlobs(ctx,W,H,rng,mod){ctx.fillStyle='rgba(0,0,0,0.45)';for(let i=0;i<3+Math.floor(rng()*3)+Math.floor(mod/2);i++){const cx=W*(0.15+rng()*0.7),cy=H*(0.15+rng()*0.7),rx=W*(0.12+rng()*0.22),ry=H*(0.1+rng()*0.2);ctx.beginPath();for(let j=0;j<8;j++){const a=(j/8)*Math.PI*2,w=0.75+rng()*0.5;j===0?ctx.moveTo(cx+Math.cos(a)*rx*w,cy+Math.sin(a)*ry*w):ctx.lineTo(cx+Math.cos(a)*rx*w,cy+Math.sin(a)*ry*w);}ctx.closePath();ctx.fill();}}
function patternSharp(ctx,W,H,rng,mod){ctx.fillStyle='rgba(0,0,0,0.5)';for(let i=0;i<5+mod*2;i++){const cx=rng()*W,cy=rng()*H,sides=3+Math.floor(rng()*3),size=20+rng()*(40+mod*8),rot=rng()*Math.PI*2;ctx.beginPath();for(let j=0;j<sides;j++){const a=rot+(j/sides)*Math.PI*2,r=size*(0.6+rng()*0.8);j===0?ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r):ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);}ctx.closePath();ctx.fill();}}
function patternTwisting(ctx,W,H,rng,mod){ctx.strokeStyle='rgba(0,0,0,0.55)';for(let i=0;i<3+Math.floor(mod/2);i++){ctx.lineWidth=8+rng()*(12+mod*3);ctx.lineCap='round';ctx.beginPath();ctx.moveTo(rng()*W,rng()*H*0.3);const s=4+Math.floor(rng()*3);for(let j=0;j<s;j++)ctx.quadraticCurveTo(rng()*W,(j/s)*H+rng()*H*0.2,rng()*W,((j+1)/s)*H);ctx.stroke();}}
function patternWaves(ctx,W,H,rng,mod){ctx.strokeStyle='rgba(0,0,0,0.5)';for(let i=0;i<3+Math.floor(mod/2);i++){const yB=(i/(3+Math.floor(mod/2)))*H+rng()*(H/(3+Math.floor(mod/2))),amp=15+rng()*(25+mod*4),freq=(2+rng()*3)*Math.PI*2/W,ph=rng()*Math.PI*2;ctx.lineWidth=6+rng()*10;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(0,yB+Math.sin(ph)*amp);for(let x=1;x<=W;x+=2)ctx.lineTo(x,yB+Math.sin(x*freq+ph)*amp);ctx.stroke();}}
function patternSoftBlur(ctx,W,H,rng,mod){for(let i=0;i<4+Math.floor(mod/2);i++){const cx=rng()*W,cy=rng()*H,r=40+rng()*(60+mod*12),g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);g.addColorStop(0,'rgba(0,0,0,0.45)');g.addColorStop(0.5,'rgba(0,0,0,0.2)');g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();}}
const PATTERN_FNS={stripes:patternStripes,dots:patternDots,blobs:patternBlobs,sharp:patternSharp,twisting:patternTwisting,waves:patternWaves,softblur:patternSoftBlur};

// ══════════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════════
function loadImage(src){return new Promise((res,rej)=>{const i=new Image();i.crossOrigin='anonymous';i.onload=()=>res(i);i.onerror=()=>rej(new Error('Cannot load: '+src));i.src=src;});}
function makeOff(W,H){const c=document.createElement('canvas');c.width=W;c.height=H;return c;}
function showError(msg){document.getElementById('loading-msg').style.display='none';const el=document.getElementById('error-msg');el.style.display='block';el.innerHTML='🐉<br>'+msg;}

// ══════════════════════════════════════════════════════════════
//  MAIN
// ══════════════════════════════════════════════════════════════
const raw = getCookie('quiz_dragon_person_01_answers');
if (!raw) { window.location.href='index.html'; }

const answers    = JSON.parse(raw);
const dragonKey  = answers.dragon;
const colorHex   = answers.colorHex;
const colorKey   = answers.color   || 'gold';
const eyeStyle   = answers.eyeStyle || 'rainbow_swirl';
const patternType = answers.patternType || 'blobs';
const seedMod    = typeof answers.seedMod === 'number' ? answers.seedMod : 0;
const descriptions = Array.isArray(answers.descriptions) ? answers.descriptions : [];

const info = DRAGON_INFO[dragonKey] || { name: dragonKey, subtitle: 'Of Ancient Lineage' };

// ── UI text ───────────────────────────────────────────────────
document.getElementById('dragon-name').textContent     = info.name;
document.getElementById('dragon-subtitle').textContent = info.subtitle;
document.getElementById('dragon-frame').style.setProperty(
  '--glow', COLOR_GLOW[colorKey] || 'rgba(201,168,76,0.18)'
);

// Descriptions
const descEl = document.getElementById('descriptions');
descriptions.forEach(line => {
  const d = document.createElement('div');
  d.className = 'desc-line';
  d.textContent = line;
  descEl.appendChild(d);
});
if (descriptions.length === 0) descEl.style.display = 'none';

// ── Independent seeds ─────────────────────────────────────────
const eyeSeed     = (strHash(dragonKey) ^ strHash(eyeStyle)  ^ 0xcafe1234) >>> 0;
const patternSeed = (strHash(dragonKey) ^ strHash(colorKey)  ^ (seedMod * 0x9e3779b9)) >>> 0;

// ── Load images ───────────────────────────────────────────────
const clippingPath = `base/clipping/${dragonKey}.png`;
const linesPath    = `base/lines/${dragonKey}.png`;
const eyePath      = `base/extra/EYEBALL.png`;

const canvas = document.getElementById('output-canvas');
const ctx    = canvas.getContext('2d');

Promise.all([
  loadImage(clippingPath),
  loadImage(linesPath),
  loadImage(eyePath).catch(() => null),
]).then(([clippingImg, linesImg, eyeImg]) => {
  const W = Math.max(clippingImg.naturalWidth,  linesImg.naturalWidth);
  const H = Math.max(clippingImg.naturalHeight, linesImg.naturalHeight);
  canvas.width=W; canvas.height=H;

  // ── A: Base — clipping flat-recolored ─────────────────────
  const offBase = makeOff(W,H), ctxBase = offBase.getContext('2d');
  ctxBase.drawImage(clippingImg, 0, 0);
  const baseData = ctxBase.getImageData(0,0,W,H);
  flatRecolor(baseData, colorHex);
  ctxBase.putImageData(baseData, 0, 0);

  // ── B: Body pattern — black, masked to clipping shape ─────
  const offPat = makeOff(W,H), ctxPat = offPat.getContext('2d');
  const patRng = mulberry32(patternSeed);
  (PATTERN_FNS[patternType] || patternBlobs)(ctxPat, W, H, patRng, seedMod);
  ctxPat.globalCompositeOperation='destination-in';
  ctxPat.drawImage(clippingImg, 0, 0);
  ctxPat.globalCompositeOperation='source-over';

  // ── C: Composite base + pattern → "beneath" canvas ───────
  //    Eye is added AFTER this, so it sits on top of pattern.
  //    Lineart samples from beneath+eye combined (see step E).
  const offBeneath = makeOff(W,H), ctxBeneath = offBeneath.getContext('2d');
  ctxBeneath.drawImage(offBase, 0, 0);
  ctxBeneath.drawImage(offPat,  0, 0);

  // ── D: Eye layer — LAST thing before lineart ──────────────
  //    Pipeline:
  //      1. Draw eye art onto an offscreen sized to EYEBALL.png
  //      2. Mask that art using EYEBALL.png's own alpha channel
  //         via destination-in (only eye-shaped pixels survive)
  //      3. Composite the masked eye onto offBeneath
  if (eyeImg) {
    const EW = eyeImg.naturalWidth, EH = eyeImg.naturalHeight;

    // Step 1: draw eye art at EYEBALL dimensions
    const offEyeArt = makeOff(EW, EH);
    const ctxEyeArt = offEyeArt.getContext('2d');
    drawEyeLayer(ctxEyeArt, EW, EH, eyeStyle, mulberry32(eyeSeed));

    // Step 2: mask to EYEBALL.png alpha (destination-in keeps only
    //         pixels where the mask is opaque)
    ctxEyeArt.globalCompositeOperation = 'destination-in';
    ctxEyeArt.drawImage(eyeImg, 0, 0);
    ctxEyeArt.globalCompositeOperation = 'source-over';

    // Step 3: place masked eye onto the beneath canvas
    // EYEBALL.png is assumed to be positioned at the canvas origin
    // matching the dragon art. Adjust ex/ey here if it needs offsetting.
    const ex = 0, ey = 0;
    ctxBeneath.drawImage(offEyeArt, ex, ey);
  }

  // Snapshot what lineart will sample from
  const beneathData = ctxBeneath.getImageData(0,0,W,H);

  // ── E: Lineart — recolored by sampling beneathData ────────
  const offLine = makeOff(W,H), ctxLine = offLine.getContext('2d');
  ctxLine.drawImage(linesImg, 0, 0);
  const lineData = ctxLine.getImageData(0,0,W,H);
  recolorLineartFromBase(lineData, beneathData);
  ctxLine.putImageData(lineData, 0, 0);

  // ── FINAL: draw all layers onto output canvas ─────────────
  ctx.clearRect(0,0,W,H);
  ctx.drawImage(offBeneath, 0, 0);           // base + pattern + eye
  ctx.globalAlpha = 0.82;
  ctx.drawImage(offLine, 0, 0);              // darkened lineart on top
  ctx.globalAlpha = 1.0;

  document.getElementById('loading-msg').style.display='none';
  canvas.style.display='block';
  document.getElementById('download-btn').style.display='inline-block';

}).catch(err=>{
  console.error(err);
  showError(`Couldn't load dragon files.<br><small style="opacity:0.5">${err.message}</small>`);
});

// ── Download ──────────────────────────────────────────────────
document.getElementById('download-btn').addEventListener('click', ()=>{
  const a=document.createElement('a');
  a.download=`${dragonKey}_${colorKey}_${patternType}.png`;
  a.href=canvas.toDataURL('image/png');
  a.click();
});

// ── Retake ────────────────────────────────────────────────────
document.getElementById('retake-btn').addEventListener('click', ()=>{
  deleteCookie('quiz_dragon_person_01_answers');
  deleteCookie('quiz_dragon_person_01_done');
  window.location.href='index.html';
});
</script>
</body>
</html>
