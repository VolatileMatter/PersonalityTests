<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Dragon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0807;
      --surface: #13100e;
      --border: #3a2e22;
      --gold: #c9a84c;
      --gold-dim: #7a6030;
      --ember: #e05c2a;
      --text: #e8dcc8;
      --text-dim: #8a7a60;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--gold-dim);
      text-decoration: none;
      font-size: 0.85rem;
      font-family: 'Cinzel Decorative', serif;
      margin-bottom: 2.5rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--gold); }

    .dragon-frame {
      position: relative;
      display: inline-block;
      margin-bottom: 2rem;
    }

    .dragon-frame::before {
      content: '';
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, var(--dragon-glow, rgba(201,168,76,0.15)), transparent 70%);
      pointer-events: none;
      animation: pulse-glow 3s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    #dragon-canvas {
      max-width: 320px;
      width: 100%;
      height: auto;
      display: block;
      animation: float 5s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .loading {
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-style: italic;
      font-size: 0.9rem;
    }

    .dragon-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      color: var(--gold);
      margin-bottom: 0.4rem;
      text-shadow: 0 0 30px rgba(201,168,76,0.3);
    }

    .dragon-subtitle {
      font-style: italic;
      font-weight: 300;
      color: var(--text-dim);
      font-size: 1.05rem;
      margin-bottom: 2.5rem;
    }

    .result-color {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.5rem 1rem;
      margin-bottom: 2.5rem;
      font-size: 0.9rem;
    }
    .color-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .btn-row {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      border-radius: 3px;
      cursor: pointer;
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.8rem;
      padding: 0.7rem 1.8rem;
      letter-spacing: 0.08em;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      display: inline-block;
    }
    .btn-primary {
      background: transparent;
      border: 1px solid var(--gold-dim);
      color: var(--gold);
    }
    .btn-primary:hover {
      background: rgba(201,168,76,0.1);
      border-color: var(--gold);
    }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .btn-ghost:hover {
      border-color: var(--gold-dim);
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="../index.html" class="back-link">← The Hoard</a>

    <div class="dragon-frame" id="dragon-frame">
      <div class="loading" id="loading">Summoning your dragon…</div>
      <canvas id="dragon-canvas" style="display:none"></canvas>
    </div>

    <div class="dragon-name" id="dragon-name"></div>
    <div class="dragon-subtitle" id="dragon-subtitle"></div>

    <div class="result-color" id="result-color" style="display:none">
      <span class="color-dot" id="color-dot"></span>
      <span id="color-label"></span>
    </div>

    <div class="btn-row">
      <a href="index.html" class="btn btn-ghost" id="retake-btn">Retake Quiz</a>
      <a href="../index.html" class="btn btn-primary">Back to Hoard</a>
    </div>
  </div>

  <script>
    // ── Color metadata ───────────────────────────────────────────
    const COLOR_DATA = {
      crimson:  { hex: '#cc2200', name: 'Crimson Dragon',   subtitle: 'Of Flame and Fury',       glow: 'rgba(204,34,0,0.2)' },
      gold:     { hex: '#c9a84c', name: 'Gilded Dragon',    subtitle: 'Keeper of the Ancient Hoard', glow: 'rgba(201,168,76,0.2)' },
      cobalt:   { hex: '#1a4fa0', name: 'Cobalt Dragon',    subtitle: 'Of the Lightless Deep',   glow: 'rgba(26,79,160,0.2)' },
      emerald:  { hex: '#1a7a45', name: 'Emerald Dragon',   subtitle: 'Child of the Wild Wood',  glow: 'rgba(26,122,69,0.2)' },
      amethyst: { hex: '#6b3fa0', name: 'Amethyst Dragon',  subtitle: 'Walker Between Dreams',   glow: 'rgba(107,63,160,0.2)' },
      obsidian: { hex: '#1a1520', name: 'Obsidian Dragon',  subtitle: 'Born of Shadow and Silence', glow: 'rgba(80,60,100,0.15)' },
      ivory:    { hex: '#e8dcc8', name: 'Ivory Dragon',     subtitle: 'Pure and Untamed',        glow: 'rgba(232,220,200,0.15)' },
      copper:   { hex: '#b87333', name: 'Copper Dragon',    subtitle: 'Memory of the Mountains', glow: 'rgba(184,115,51,0.2)' },
    };

    // ── Cookie helper ───────────────────────────────────────────
    function getCookie(name) {
      const v = document.cookie.split(';').map(c => c.trim()).find(c => c.startsWith(name + '='));
      return v ? decodeURIComponent(v.split('=')[1]) : null;
    }
    function setCookie(name, value, days = 365) {
      const d = new Date();
      d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
      document.cookie = `${name}=${encodeURIComponent(value)};expires=${d.toUTCString()};path=/`;
    }
    function deleteCookie(name) {
      document.cookie = `${name}=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/`;
    }

    // ── HSV color blend ──────────────────────────────────────────
    // Converts an RGB pixel to HSV, replaces H+S with target color's H+S,
    // preserves V (luminance/shadow), then converts back.

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return [r,g,b];
    }

    function rgbToHsv(r,g,b) {
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r,g,b), min = Math.min(r,g,b);
      const d = max - min;
      let h = 0, s = max === 0 ? 0 : d/max, v = max;
      if (d !== 0) {
        switch(max) {
          case r: h = ((g-b)/d + (g<b?6:0)) / 6; break;
          case g: h = ((b-r)/d + 2) / 6; break;
          case b: h = ((r-g)/d + 4) / 6; break;
        }
      }
      return [h, s, v];
    }

    function hsvToRgb(h, s, v) {
      let r, g, b;
      const i = Math.floor(h * 6);
      const f = h * 6 - i;
      const p = v * (1 - s);
      const q = v * (1 - f * s);
      const t = v * (1 - (1 - f) * s);
      switch(i % 6) {
        case 0: r=v; g=t; b=p; break;
        case 1: r=q; g=v; b=p; break;
        case 2: r=p; g=v; b=t; break;
        case 3: r=p; g=q; b=v; break;
        case 4: r=t; g=p; b=v; break;
        case 5: r=v; g=p; b=q; break;
      }
      return [Math.round(r*255), Math.round(g*255), Math.round(b*255)];
    }

    function applyHsvColorToImage(imageData, targetHex) {
      const [tr, tg, tb] = hexToRgb(targetHex);
      const [th, ts] = rgbToHsv(tr, tg, tb);

      const data = imageData.data;
      const ALPHA_THRESHOLD = 50; // ~20% opacity

      for (let i = 0; i < data.length; i += 4) {
        const alpha = data[i + 3];
        if (alpha <= ALPHA_THRESHOLD) continue;

        const r = data[i], g = data[i+1], b = data[i+2];
        const [, , sv] = rgbToHsv(r, g, b); // keep V (luminance)

        // Use target H and S, keep source V (preserves shadows/highlights)
        const [nr, ng, nb] = hsvToRgb(th, ts, sv);
        data[i]   = nr;
        data[i+1] = ng;
        data[i+2] = nb;
        // alpha unchanged
      }
      return imageData;
    }

    // ── Main ─────────────────────────────────────────────────────
    const raw = getCookie('quiz_dragon_person_01_answers');
    const canvas = document.getElementById('dragon-canvas');
    const loading = document.getElementById('loading');

    if (!raw) {
      // No answers — redirect to quiz
      window.location.href = 'index.html';
    } else {
      const answers = JSON.parse(raw);
      const colorKey = answers.color;
      const colorInfo = COLOR_DATA[colorKey] || COLOR_DATA['gold'];

      // Update text
      document.getElementById('dragon-name').textContent = colorInfo.name;
      document.getElementById('dragon-subtitle').textContent = colorInfo.subtitle;
      document.getElementById('color-dot').style.background = colorInfo.hex;
      document.getElementById('color-label').textContent = colorKey.charAt(0).toUpperCase() + colorKey.slice(1);
      document.getElementById('result-color').style.display = 'inline-flex';

      // Glow
      document.querySelector('.dragon-frame').style.setProperty('--dragon-glow', colorInfo.glow);

      // Load dragon image → color → canvas
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.src = 'dragon.png';

      img.onload = () => {
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;

        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const colored = applyHsvColorToImage(imageData, colorInfo.hex);
        ctx.putImageData(colored, 0, 0);

        loading.style.display = 'none';
        canvas.style.display = 'block';
      };

      img.onerror = () => {
        // No dragon.png yet — show placeholder
        loading.textContent = '🐉 (place dragon.png in this folder)';
      };
    }

    // ── Start over ────────────────────────────────────────────────
    document.getElementById('retake-btn').addEventListener('click', (e) => {
      e.preventDefault();
      deleteCookie('quiz_dragon_person_01_answers');
      deleteCookie('quiz_dragon_person_01_done');
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
