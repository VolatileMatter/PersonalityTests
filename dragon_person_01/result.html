<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Dragon</title>
  <link rel="stylesheet" href="../shared.css">
  <style>
    body { justify-content: flex-start; padding-top: 3rem; }

    .page { display: flex; flex-direction: column; align-items: center; text-align: center; width: 100%; }

    /* ── Glow frame ──────────────────────────────────────── */
    .dragon-frame {
      position: relative; display: inline-block;
      margin-bottom: 2rem;
    }
    .dragon-frame::before {
      content: '';
      position: absolute; inset: -32px; border-radius: 50%;
      background: radial-gradient(ellipse, var(--glow, rgba(201,168,76,0.15)), transparent 65%);
      pointer-events: none;
      animation: pulse-glow 3.5s ease-in-out infinite;
    }
    #output-canvas {
      max-width: 420px; width: 100%; height: auto;
      display: none;
      animation: float 5s ease-in-out infinite;
    }
    .loading-msg {
      width: 240px; height: 240px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 0.8rem;
      color: var(--text-dim); font-style: italic; font-size: 0.9rem;
    }
    .error-msg {
      width: 280px; padding: 1.5rem;
      border: 1px solid var(--border); border-radius: 4px;
      color: var(--text-dim); font-style: italic; font-size: 0.85rem;
      display: none; line-height: 1.7;
    }

    /* ── Dragon title ────────────────────────────────────── */
    .dragon-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.5rem, 5vw, 2.3rem);
      color: var(--gold);
      text-shadow: 0 0 30px rgba(201,168,76,0.25);
      margin-bottom: 0.35rem;
    }
    .dragon-subtitle {
      font-style: italic; font-weight: 300;
      color: var(--text-dim); font-size: 1rem;
      margin-bottom: 2rem;
    }

    /* ── Stat pills ──────────────────────────────────────── */
    .stat-row {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 0.45rem; margin-bottom: 2.5rem;
    }
    .stat {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 2px; padding: 0.25rem 0.75rem;
      font-size: 0.65rem; font-family: 'Cinzel Decorative', serif;
      color: var(--text-muted); letter-spacing: 0.07em;
    }
    .stat span { color: var(--gold-dim); font-family: 'Crimson Pro', serif; font-style: italic; font-size: 0.8rem; letter-spacing: 0; }

    /* ── Buttons ─────────────────────────────────────────── */
    .btn-row { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; margin-bottom: 3rem; }
  </style>
</head>

<script>

// ══════════════════════════════════════════════════════════════
//  COOKIES
// ══════════════════════════════════════════════════════════════
function getCookie(name) {
  const v = document.cookie.split(';').map(c => c.trim()).find(c => c.startsWith(name + '='));
  return v ? decodeURIComponent(v.split('=')[1]) : null;
}
function deleteCookie(name) {
  document.cookie = `${name}=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/`;
}

// ══════════════════════════════════════════════════════════════
//  SEEDED PRNG — mulberry32
// ══════════════════════════════════════════════════════════════
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function strHash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
  return h >>> 0;
}

// ══════════════════════════════════════════════════════════════
//  COLOR HELPERS
// ══════════════════════════════════════════════════════════════
function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function rgbToHsv(r,g,b) {
  r/=255;g/=255;b/=255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min;
  let h=0,s=max===0?0:d/max,v=max;
  if(d!==0){switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break;}}
  return[h,s,v];
}
function hsvToHex(h,s,v){
  const i=Math.floor(h*6),f=h*6-i,p=v*(1-s),q=v*(1-f*s),t=v*(1-(1-f)*s);
  let r,g,b;
  switch(i%6){case 0:r=v;g=t;b=p;break;case 1:r=q;g=v;b=p;break;case 2:r=p;g=v;b=t;break;case 3:r=p;g=q;b=v;break;case 4:r=t;g=p;b=v;break;case 5:r=v;g=p;b=q;break;}
  return'#'+[r,g,b].map(x=>Math.round(x*255).toString(16).padStart(2,'0')).join('');
}
function darkenHex(hex, v=0.18) {
  const [r,g,b]=hexToRgb(hex);
  const [h,s]=rgbToHsv(r,g,b);
  return hsvToHex(h, Math.min(s*1.1,1), v);
}

// ══════════════════════════════════════════════════════════════
//  RECOLOR helpers
// ══════════════════════════════════════════════════════════════
function flatRecolor(imageData, hex) {
  const [tr,tg,tb] = hexToRgb(hex);
  const d = imageData.data;
  for (let i=0;i<d.length;i+=4) {
    if (d[i+3]<=50) continue;
    d[i]=tr; d[i+1]=tg; d[i+2]=tb;
  }
  return imageData;
}

// ══════════════════════════════════════════════════════════════
//  EYE PROCGEN — seeds from (dragon + eyeStyle)
//  Draws full-size onto EYEBALL.png dimensions
// ══════════════════════════════════════════════════════════════
function drawEyeLayer(ctx, W, H, style, rng) {
  const cx = W/2, cy = H/2;
  const r  = Math.min(W, H) * 0.48;

  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.clip();

  switch(style) {
    case 'pink_purple_swirl': {
      const g = ctx.createRadialGradient(cx,cy,0,cx,cy,r);
      g.addColorStop(0,'#ff80c0'); g.addColorStop(0.5,'#c050c0'); g.addColorStop(1,'#5010a0');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='rgba(255,200,255,0.4)'; ctx.lineWidth=Math.max(2,W*0.015);
      for(let i=0;i<5;i++){
        ctx.beginPath();
        for(let a=0;a<Math.PI*6;a+=0.05){
          const rad=(a/(Math.PI*6))*r*0.95;
          const px=cx+Math.cos(a+i*1.26+rng()*0.3)*rad;
          const py=cy+Math.sin(a+i*1.26+rng()*0.3)*rad;
          a<0.05?ctx.moveTo(px,py):ctx.lineTo(px,py);
        }
        ctx.stroke();
      }
      break;
    }
    case 'gold_white_swirl': {
      const g = ctx.createRadialGradient(cx,cy,0,cx,cy,r);
      g.addColorStop(0,'#fffce0'); g.addColorStop(0.4,'#e8c060'); g.addColorStop(1,'#7a5010');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='rgba(255,255,230,0.5)'; ctx.lineWidth=Math.max(2,W*0.015);
      for(let i=0;i<5;i++){
        ctx.beginPath();
        for(let a=0;a<Math.PI*6;a+=0.05){
          const rad=(a/(Math.PI*6))*r*0.95;
          const px=cx+Math.cos(a+i*1.26)*rad;
          const py=cy+Math.sin(a+i*1.26)*rad;
          a<0.05?ctx.moveTo(px,py):ctx.lineTo(px,py);
        }
        ctx.stroke();
      }
      break;
    }
    case 'green_gold_split': {
      // Left green gradient, right gold gradient
      const gl=ctx.createLinearGradient(0,0,W,0);
      gl.addColorStop(0,'#0a5020'); gl.addColorStop(0.46,'#1a9a40');
      gl.addColorStop(0.54,'#c9a84c'); gl.addColorStop(1,'#6a4008');
      ctx.fillStyle=gl; ctx.fillRect(0,0,W,H);
      // vertical split shimmer
      const sl=ctx.createLinearGradient(cx-4,0,cx+4,0);
      sl.addColorStop(0,'rgba(255,255,200,0)');
      sl.addColorStop(0.5,'rgba(255,255,200,0.35)');
      sl.addColorStop(1,'rgba(255,255,200,0)');
      ctx.fillStyle=sl; ctx.fillRect(cx-4,0,8,H);
      break;
    }
    case 'purple_blue_blob': {
      ctx.fillStyle='#050312'; ctx.fillRect(0,0,W,H);
      const centers=[[cx-r*0.2,cy-r*0.15,'#4020a0'],[cx+r*0.2,cy+r*0.1,'#1040c0'],[cx,cy,'#5530b0']];
      centers.forEach(([bx,by,col])=>{
        const bg=ctx.createRadialGradient(bx,by,0,bx,by,r*(0.5+rng()*0.3));
        bg.addColorStop(0,col+'dd'); bg.addColorStop(1,'transparent');
        ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
      });
      break;
    }
    case 'rainbow_swirl': {
      for(let i=0;i<360;i+=2){
        const a1=i*Math.PI/180, a2=(i+2)*Math.PI/180;
        ctx.beginPath(); ctx.moveTo(cx,cy);
        ctx.arc(cx,cy,r,a1,a2); ctx.closePath();
        ctx.fillStyle=`hsl(${i},100%,55%)`; ctx.fill();
      }
      ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=Math.max(1.5,W*0.012);
      for(let i=0;i<4;i++){
        ctx.beginPath();
        for(let a=0;a<Math.PI*4;a+=0.05){
          const rad=(a/(Math.PI*4))*r*0.9;
          const px=cx+Math.cos(a+i*1.57)*rad;
          const py=cy+Math.sin(a+i*1.57)*rad;
          a<0.05?ctx.moveTo(px,py):ctx.lineTo(px,py);
        }
        ctx.stroke();
      }
      break;
    }
    case 'cyan_blue_space': {
      ctx.fillStyle='#000c20'; ctx.fillRect(0,0,W,H);
      [[cx-r*0.15,cy-r*0.1,'#00b0c8'],[cx+r*0.2,cy+r*0.15,'#1030c0'],[cx-r*0.1,cy+r*0.2,'#0080b0']].forEach(([bx,by,col])=>{
        const bg=ctx.createRadialGradient(bx,by,0,bx,by,r*(0.45+rng()*0.25));
        bg.addColorStop(0,col+'cc'); bg.addColorStop(1,'transparent');
        ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
      });
      // gold sparkles — seeded so always same positions
      ctx.fillStyle='#ffd700';
      for(let i=0;i<14;i++){
        const sx=rng()*W, sy=rng()*H;
        const sr=0.5+rng()*Math.max(1.5, W*0.008);
        ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fill();
        // cross spike on bigger ones
        if(sr>W*0.006){
          ctx.strokeStyle='rgba(255,215,0,0.6)'; ctx.lineWidth=0.5;
          ctx.beginPath(); ctx.moveTo(sx-sr*2,sy); ctx.lineTo(sx+sr*2,sy); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(sx,sy-sr*2); ctx.lineTo(sx,sy+sr*2); ctx.stroke();
        }
      }
      break;
    }
    case 'black_purple_stripes': {
      ctx.fillStyle='#06030f'; ctx.fillRect(0,0,W,H);
      const stripeW = Math.max(4, W*0.06);
      ctx.strokeStyle='#3a0878'; ctx.lineWidth=stripeW*0.6;
      for(let i=-W;i<W*2;i+=stripeW*1.6){
        ctx.beginPath(); ctx.moveTo(i,-H*0.1); ctx.lineTo(i+H*1.2,H*1.1); ctx.stroke();
      }
      // faint purple shimmer
      const sg=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
      sg.addColorStop(0,'rgba(80,0,160,0.2)'); sg.addColorStop(1,'transparent');
      ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);
      break;
    }
    case 'pink_purple_hearts': {
      const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
      g.addColorStop(0,'#ffc0d8'); g.addColorStop(1,'#c060a0');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      // draw hearts at seeded positions
      const heartSize = Math.max(8, W*0.09);
      ctx.fillStyle='rgba(140,20,100,0.45)';
      const heartPositions=[[cx-r*0.3,cy-r*0.2],[cx+r*0.28,cy+r*0.15],[cx-r*0.05,cy+r*0.3],[cx+r*0.1,cy-r*0.35]];
      heartPositions.forEach(([hx,hy])=>{
        const s=heartSize*(0.7+rng()*0.6);
        ctx.beginPath();
        ctx.moveTo(hx, hy+s*0.4);
        ctx.bezierCurveTo(hx, hy-s*0.2, hx-s,    hy-s*0.6, hx-s,   hy);
        ctx.bezierCurveTo(hx-s,hy+s*0.7, hx,      hy+s*1.1, hx,     hy+s*1.3);
        ctx.bezierCurveTo(hx,  hy+s*1.1, hx+s,    hy+s*0.7, hx+s,   hy);
        ctx.bezierCurveTo(hx+s,hy-s*0.6, hx,      hy-s*0.2, hx,     hy+s*0.4);
        ctx.fill();
      });
      break;
    }
  }
  ctx.restore();
}

// ══════════════════════════════════════════════════════════════
//  BODY PATTERN GENERATORS — seed from (dragon + color + personality)
//  Draw in black, will be masked to clipping shape
// ══════════════════════════════════════════════════════════════
function patternStripes(ctx,W,H,rng,mod){
  const count=6+Math.floor(rng()*8)+mod;
  const angle=(rng()*40-20)*Math.PI/180;
  const sw=W/(count*2);
  ctx.save(); ctx.translate(W/2,H/2); ctx.rotate(angle); ctx.translate(-W,-H);
  ctx.fillStyle='rgba(0,0,0,0.55)';
  for(let i=0;i<count*4;i+=2){
    const x=i*sw-W/2, vw=sw*(0.5+rng()*0.8);
    ctx.fillRect(x,-H,vw,H*3);
  }
  ctx.restore();
}
function patternDots(ctx,W,H,rng,mod){
  const n=30+mod*8; ctx.fillStyle='rgba(0,0,0,0.6)';
  for(let i=0;i<n;i++){
    ctx.beginPath();
    ctx.arc(rng()*W, rng()*H, 4+rng()*(8+mod*2), 0, Math.PI*2);
    ctx.fill();
  }
}
function patternBlobs(ctx,W,H,rng,mod){
  const n=3+Math.floor(rng()*3)+Math.floor(mod/2);
  ctx.fillStyle='rgba(0,0,0,0.45)';
  for(let i=0;i<n;i++){
    const cx=W*(0.15+rng()*0.7), cy=H*(0.15+rng()*0.7);
    const rx=W*(0.12+rng()*0.22), ry=H*(0.10+rng()*0.20);
    ctx.beginPath();
    for(let j=0;j<8;j++){
      const a=(j/8)*Math.PI*2, wob=0.75+rng()*0.5;
      const px=cx+Math.cos(a)*rx*wob, py=cy+Math.sin(a)*ry*wob;
      j===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.closePath(); ctx.fill();
  }
}
function patternSharp(ctx,W,H,rng,mod){
  const n=5+mod*2; ctx.fillStyle='rgba(0,0,0,0.5)';
  for(let i=0;i<n;i++){
    const cx=rng()*W, cy=rng()*H, sides=3+Math.floor(rng()*3);
    const size=20+rng()*(40+mod*8), rot=rng()*Math.PI*2;
    ctx.beginPath();
    for(let j=0;j<sides;j++){
      const a=rot+(j/sides)*Math.PI*2, r=size*(0.6+rng()*0.8);
      const px=cx+Math.cos(a)*r, py=cy+Math.sin(a)*r;
      j===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.closePath(); ctx.fill();
  }
}
function patternTwisting(ctx,W,H,rng,mod){
  const n=3+Math.floor(mod/2);
  ctx.strokeStyle='rgba(0,0,0,0.55)';
  for(let i=0;i<n;i++){
    ctx.lineWidth=8+rng()*(12+mod*3); ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(rng()*W, rng()*H*0.3);
    const segs=4+Math.floor(rng()*3);
    for(let j=0;j<segs;j++){
      ctx.quadraticCurveTo(rng()*W,(j/segs)*H+rng()*H*0.2, rng()*W,((j+1)/segs)*H);
    }
    ctx.stroke();
  }
}
function patternWaves(ctx,W,H,rng,mod){
  const n=3+Math.floor(mod/2);
  ctx.strokeStyle='rgba(0,0,0,0.5)';
  for(let i=0;i<n;i++){
    const yBase=(i/n)*H+rng()*(H/n);
    const amp=15+rng()*(25+mod*4);
    const freq=(2+rng()*3)*Math.PI*2/W;
    const phase=rng()*Math.PI*2;
    ctx.lineWidth=6+rng()*10; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(0,yBase+Math.sin(phase)*amp);
    for(let x=1;x<=W;x+=2) ctx.lineTo(x,yBase+Math.sin(x*freq+phase)*amp);
    ctx.stroke();
  }
}
function patternSoftBlur(ctx,W,H,rng,mod){
  const n=4+Math.floor(mod/2);
  for(let i=0;i<n;i++){
    const cx=rng()*W, cy=rng()*H, r=40+rng()*(60+mod*12);
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
    g.addColorStop(0,'rgba(0,0,0,0.45)'); g.addColorStop(0.5,'rgba(0,0,0,0.2)'); g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
  }
}
const PATTERN_FNS = { stripes:patternStripes, dots:patternDots, blobs:patternBlobs, sharp:patternSharp, twisting:patternTwisting, waves:patternWaves, softblur:patternSoftBlur };

// ══════════════════════════════════════════════════════════════
//  IMAGE LOADER
// ══════════════════════════════════════════════════════════════
function loadImage(src) {
  return new Promise((res,rej)=>{
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload=()=>res(img);
    img.onerror=()=>rej(new Error('Could not load: '+src));
    img.src=src;
  });
}
function makeOffscreen(W,H){ const c=document.createElement('canvas'); c.width=W; c.height=H; return c; }

function showError(msg) {
  document.getElementById('loading-msg').style.display='none';
  const el=document.getElementById('error-msg'); el.style.display='block';
  el.innerHTML='🐉<br>'+msg;
}

// ══════════════════════════════════════════════════════════════
//  MAIN — read cookie, composite
// ══════════════════════════════════════════════════════════════
const raw = getCookie('quiz_dragon_person_01_answers');
if (!raw) { window.location.href='index.html'; }

const answers    = JSON.parse(raw);
const dragonKey  = answers.dragon;
const colorHex   = answers.colorHex;
const colorKey   = answers.color   || 'gold';
const eyeStyle   = answers.eyeStyle || 'rainbow_swirl';
const patternType = answers.patternType || 'blobs';
const seedMod    = typeof answers.seedMod === 'number' ? answers.seedMod : 0;

const info = DRAGON_INFO[dragonKey] || { name: dragonKey, subtitle: 'Of Ancient Lineage' };

// ── UI text ───────────────────────────────────────────────────
document.getElementById('dragon-name').textContent     = info.name;
document.getElementById('dragon-subtitle').textContent = info.subtitle;
document.getElementById('dragon-frame').style.setProperty(
  '--glow', COLOR_GLOW[colorKey] || 'rgba(201,168,76,0.18)'
);

const statRow = document.getElementById('stat-row');
[
  ['Color',    colorKey.charAt(0).toUpperCase()+colorKey.slice(1)],
  ['Pattern',  patternType],
  ['Eye',      (answers.eyeStyleValue||eyeStyle).replace(/_/g,' ')],
  ['Nature',   answers.activity ? answers.activity.replace(/_/g,' ') : '—'],
].forEach(([k,v])=>{
  const s=document.createElement('div'); s.className='stat';
  s.innerHTML=`${k}: <span>${v}</span>`;
  statRow.appendChild(s);
});

// ── Compute seeds — each layer independent ───────────────────
// Eye seed: dragon + eyeStyle
const eyeSeed = (strHash(dragonKey) ^ strHash(eyeStyle) ^ 0xcafe1234) >>> 0;
// Pattern seed: dragon + color + personality/seedMod
const patternSeed = (strHash(dragonKey) ^ strHash(colorKey) ^ (seedMod * 0x9e3779b9)) >>> 0;

const darkLineHex = darkenHex(colorHex, 0.18);

// ── File paths ────────────────────────────────────────────────
const clippingPath = `base/clipping/${dragonKey}.png`;
const linesPath    = `base/lines/${dragonKey}.png`;
const eyePath      = `base/extras/EYEBALL.png`;

const canvas = document.getElementById('output-canvas');
const ctx    = canvas.getContext('2d');

// Load all three images in parallel
Promise.all([
  loadImage(clippingPath),
  loadImage(linesPath),
  loadImage(eyePath).catch(()=>null), // eye is optional — null if missing
]).then(([clippingImg, linesImg, eyeImg]) => {
  const W = Math.max(clippingImg.naturalWidth,  linesImg.naturalWidth);
  const H = Math.max(clippingImg.naturalHeight, linesImg.naturalHeight);
  canvas.width=W; canvas.height=H;

  // ── LAYER A: base color (clipping flat-recolored) ─────────
  const offBase = makeOffscreen(W,H);
  const ctxBase = offBase.getContext('2d');
  ctxBase.drawImage(clippingImg, 0, 0);
  const baseData = ctxBase.getImageData(0,0,W,H);
  flatRecolor(baseData, colorHex);
  ctxBase.putImageData(baseData, 0, 0);

  // ── LAYER B: body pattern (black, masked to clipping) ─────
  const offPat = makeOffscreen(W,H);
  const ctxPat = offPat.getContext('2d');
  const patRng = mulberry32(patternSeed);
  const patFn  = PATTERN_FNS[patternType] || patternBlobs;
  patFn(ctxPat, W, H, patRng, seedMod);
  // Mask to dragon silhouette
  ctxPat.globalCompositeOperation='destination-in';
  ctxPat.drawImage(clippingImg, 0, 0);
  ctxPat.globalCompositeOperation='source-over';

  // ── LAYER C: eye (optional) ───────────────────────────────
  // Draw eye procgen onto EYEBALL.png shape, positioned on canvas
  const offEye = makeOffscreen(W,H);
  if (eyeImg) {
    const ctxEye = offEye.getContext('2d');
    const EW = eyeImg.naturalWidth, EH = eyeImg.naturalHeight;

    // Draw eye art into a temp canvas sized to the eyeball image
    const offEyeArt = makeOffscreen(EW, EH);
    const ctxEyeArt = offEyeArt.getContext('2d');
    const eyeRng = mulberry32(eyeSeed);
    drawEyeLayer(ctxEyeArt, EW, EH, eyeStyle, eyeRng);

    // Mask eye art to EYEBALL.png alpha
    ctxEyeArt.globalCompositeOperation='destination-in';
    ctxEyeArt.drawImage(eyeImg, 0, 0);
    ctxEyeArt.globalCompositeOperation='source-over';

    // Draw the masked eye onto the full-canvas eye layer
    // Position: centered on the canvas (adjust x/y offset if needed)
    const ex = (W - EW) / 2;
    const ey = (H - EH) / 2;
    ctxEye.drawImage(offEyeArt, ex, ey);
  }

  // ── LAYER D: lineart recolored to dark shade ──────────────
  const offLine = makeOffscreen(W,H);
  const ctxLine = offLine.getContext('2d');
  ctxLine.drawImage(linesImg, 0, 0);
  const lineData = ctxLine.getImageData(0,0,W,H);
  flatRecolor(lineData, darkLineHex);
  ctxLine.putImageData(lineData, 0, 0);

  // ── FINAL COMPOSITE ───────────────────────────────────────
  // 1. Base color
  ctx.clearRect(0,0,W,H);
  ctx.drawImage(offBase, 0, 0);
  // 2. Body pattern
  ctx.drawImage(offPat, 0, 0);
  // 3. Eye layer (full opacity — already shaped by eyeball mask)
  if (eyeImg) ctx.drawImage(offEye, 0, 0);
  // 4. Lineart at 75% opacity
  ctx.globalAlpha = 0.75;
  ctx.drawImage(offLine, 0, 0);
  ctx.globalAlpha = 1.0;

  // ── Show ──────────────────────────────────────────────────
  document.getElementById('loading-msg').style.display='none';
  canvas.style.display='block';
  document.getElementById('download-btn').style.display='inline-block';

}).catch(err=>{
  console.error(err);
  showError(`Couldn't load dragon files.<br><small style="opacity:0.5">${err.message}</small>`);
});

// ── Download ──────────────────────────────────────────────────
document.getElementById('download-btn').addEventListener('click', ()=>{
  const a=document.createElement('a');
  a.download=`${dragonKey}_${colorKey}_${patternType}.png`;
  a.href=canvas.toDataURL('image/png');
  a.click();
});

// ── Retake ────────────────────────────────────────────────────
document.getElementById('retake-btn').addEventListener('click', ()=>{
  deleteCookie('quiz_dragon_person_01_answers');
  deleteCookie('quiz_dragon_person_01_done');
  window.location.href='index.html';
});
</script>
</body>
</html>
