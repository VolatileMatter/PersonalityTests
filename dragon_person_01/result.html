<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Dragon</title>
  <link rel="stylesheet" href="../shared.css">
  <style>
    body { justify-content: flex-start; padding-top: 3rem; }
    .page { display: flex; flex-direction: column; align-items: center; text-align: center; width: 100%; }

    .dragon-frame {
      position: relative; display: inline-block; margin-bottom: 2rem;
    }
    .dragon-frame::before {
      content: '';
      position: absolute; inset: -32px; border-radius: 50%;
      background: radial-gradient(ellipse, var(--glow, rgba(201,168,76,0.15)), transparent 65%);
      pointer-events: none;
      animation: pulse-glow 3.5s ease-in-out infinite;
    }
    #output-canvas {
      max-width: 420px; width: 100%; height: auto;
      display: none; animation: float 5s ease-in-out infinite;
    }
    .loading-msg {
      width: 240px; height: 240px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 0.8rem;
      color: var(--text-dim); font-style: italic; font-size: 0.9rem;
    }
    .error-msg {
      width: 280px; padding: 1.5rem;
      border: 1px solid var(--border); border-radius: 4px;
      color: var(--text-dim); font-style: italic;
      font-size: 0.85rem; line-height: 1.7; display: none;
    }

    .dragon-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.5rem, 5vw, 2.3rem); color: var(--gold);
      text-shadow: 0 0 30px rgba(201,168,76,0.25);
      margin-bottom: 0.35rem;
    }
    .dragon-subtitle {
      font-style: italic; font-weight: 300;
      color: var(--text-dim); font-size: 1rem; margin-bottom: 2rem;
    }

    .descriptions {
      max-width: 420px; width: 100%;
      display: flex; flex-direction: column; gap: 0.6rem;
      margin-bottom: 2rem;
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
    }
    .desc-line {
      font-size: 0.95rem; color: var(--text-dim);
      font-style: italic; line-height: 1.5;
      padding-left: 1rem;
      border-left: 2px solid var(--border-bright);
      text-align: left;
    }

    .btn-row {
      display: flex; gap: 0.75rem;
      justify-content: center; flex-wrap: wrap; margin-bottom: 3rem;
    }
  </style>
</head>
<body>
<div class="page container--sm">
  <a href="../index.html" class="back-link">← The Hoard</a>

  <div class="dragon-frame" id="dragon-frame">
    <div class="loading-msg" id="loading-msg">
      <div class="spinner"></div>
      <span>Summoning your dragon…</span>
    </div>
    <div class="error-msg" id="error-msg"></div>
    <canvas id="output-canvas"></canvas>
  </div>

  <div class="dragon-name"     id="dragon-name"></div>
  <div class="dragon-subtitle" id="dragon-subtitle"></div>
  <div class="descriptions"    id="descriptions"></div>

  <div class="btn-row">
    <button class="btn btn--teal"  id="download-btn" style="display:none">⬇ Download PNG</button>
    <button class="btn btn--ghost" id="retake-btn">Retake Quiz</button>
    <a href="../index.html"        class="btn btn--gold">← The Hoard</a>
  </div>
</div>

// ══════════════════════════════════════════════════════════════
//  COOKIES
// ══════════════════════════════════════════════════════════════
function getCookie(name) {
  const v = document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith(name+'='));
  return v ? decodeURIComponent(v.split('=')[1]) : null;
}
function deleteCookie(name) {
  document.cookie=`${name}=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/`;
}

// ══════════════════════════════════════════════════════════════
//  SEEDED PRNG
// ══════════════════════════════════════════════════════════════
function mulberry32(seed) {
  return function() {
    seed|=0; seed=seed+0x6D2B79F5|0;
    let t=Math.imul(seed^seed>>>15,1|seed);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return((t^t>>>14)>>>0)/4294967296;
  };
}
function strHash(s) {
  let h=0;
  for(let i=0;i<s.length;i++) h=(Math.imul(31,h)+s.charCodeAt(i))|0;
  return h>>>0;
}

// ══════════════════════════════════════════════════════════════
//  COLOR HELPERS
// ══════════════════════════════════════════════════════════════
function hexToRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function rgbToHsv(r,g,b){
  r/=255;g/=255;b/=255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;
  let h=0,s=mx===0?0:d/mx,v=mx;
  if(d!==0){switch(mx){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break;}}
  return[h,s,v];
}
function hsvToRgb(h,s,v){
  const i=Math.floor(h*6),f=h*6-i,p=v*(1-s),q=v*(1-f*s),t=v*(1-(1-f)*s);
  let r,g,b;
  switch(i%6){case 0:r=v;g=t;b=p;break;case 1:r=q;g=v;b=p;break;case 2:r=p;g=v;b=t;break;case 3:r=p;g=q;b=v;break;case 4:r=t;g=p;b=v;break;case 5:r=v;g=p;b=q;break;}
  return[Math.round(r*255),Math.round(g*255),Math.round(b*255)];
}

// Flat recolor: all visible pixels → target hex, preserve alpha
function flatRecolor(imageData, hex) {
  const[tr,tg,tb]=hexToRgb(hex), d=imageData.data;
  for(let i=0;i<d.length;i+=4){
    if(d[i+3]<=50)continue;
    d[i]=tr;d[i+1]=tg;d[i+2]=tb;
  }
  return imageData;
}

// ══════════════════════════════════════════════════════════════
//  LINEART RECOLOR — MUCH MORE SATURATED AND DARKER
//  Boost saturation by +0.65 (was +0.4), crush value by -0.70 (was -0.55)
// ══════════════════════════════════════════════════════════════
function recolorLineartFromBase(lineData, baseData) {
  const ld = lineData.data;
  const bd = baseData.data;
  for (let i = 0; i < ld.length; i += 4) {
    if (ld[i+3] <= 50) continue;
    if (bd[i+3] <= 50) {
      ld[i]=0; ld[i+1]=0; ld[i+2]=0;
    } else {
      const [h, s, v] = rgbToHsv(bd[i], bd[i+1], bd[i+2]);
      // MUCH more saturated: +0.65 instead of +0.4
      const ns = Math.min(s + 0.65, 1.0);
      // MUCH darker: -0.70 instead of -0.55
      const nv = Math.max(v - 0.70, 0.05);
      const [nr, ng, nb] = hsvToRgb(h, ns, nv);
      ld[i]=nr; ld[i+1]=ng; ld[i+2]=nb;
    }
  }
  return lineData;
}

// New function: draw eye pattern within specific bounds
function drawEyeLayerWithinBounds(ctx, W, H, style, rng, bounds) {
  console.log(`🎨 drawEyeLayerWithinBounds: style=${style}, bounds=`, bounds);
  
  // Clear the entire canvas first
  ctx.clearRect(0, 0, W, H);
  
  // Save context state
  ctx.save();
  
  // Clip to the bounds rectangle (where the eyeball lives)
  ctx.beginPath();
  ctx.rect(bounds.x, bounds.y, bounds.w, bounds.h);
  ctx.clip();
  
  // Calculate center of the bounds
  const cx = bounds.x + bounds.w / 2;
  const cy = bounds.y + bounds.h / 2;
  const r = Math.min(bounds.w, bounds.h) / 2;
  
  // Now draw the pattern scaled/translated to fit the bounds
  // (Same drawing code as drawEyeLayer but using cx, cy, r from bounds)
  
  function spiral(offsetAngle, jitter) {
    ctx.beginPath();
    let first = true;
    for (let a = 0.01; a < Math.PI * 6; a += 0.05) {
      const rad = (a / (Math.PI * 6)) * r * 0.95;
      const jx = jitter ? (rng() - 0.5) * rad * 0.15 : 0;
      const jy = jitter ? (rng() - 0.5) * rad * 0.15 : 0;
      const px = cx + Math.cos(a + offsetAngle) * rad + jx;
      const py = cy + Math.sin(a + offsetAngle) * rad + jy;
      first ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      first = false;
    }
    ctx.stroke();
  }
  
  // Pattern drawing (same as original drawEyeLayer but using cx, cy, r)
  switch(style) {
    case 'pink_purple_swirl': {
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      g.addColorStop(0, '#ff80c0'); g.addColorStop(0.5, '#c050c0'); g.addColorStop(1, '#5010a0');
      ctx.fillStyle = g; ctx.fillRect(bounds.x, bounds.y, bounds.w, bounds.h);
      ctx.strokeStyle = 'rgba(255,200,255,0.45)'; ctx.lineWidth = Math.max(2, r * 0.03);
      for (let i = 0; i < 5; i++) spiral(i * 1.26, true);
      break;
    }
    case 'gold_white_swirl': {
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      g.addColorStop(0, '#fffce0'); g.addColorStop(0.4, '#e8c060'); g.addColorStop(1, '#7a5010');
      ctx.fillStyle = g; ctx.fillRect(bounds.x, bounds.y, bounds.w, bounds.h);
      ctx.strokeStyle = 'rgba(255,255,230,0.55)'; ctx.lineWidth = Math.max(2, r * 0.03);
      for (let i = 0; i < 5; i++) spiral(i * 1.26, false);
      break;
    }
    case 'rainbow_swirl': {
      for (let i = 0; i < 360; i += 2) {
        ctx.beginPath(); ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, i * Math.PI / 180, (i + 2) * Math.PI / 180); ctx.closePath();
        ctx.fillStyle = `hsl(${i}, 100%, 55%)`; ctx.fill();
      }
      ctx.strokeStyle = 'rgba(255,255,255,0.38)'; ctx.lineWidth = Math.max(1.5, r * 0.025);
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        let first = true;
        for (let a = 0.01; a < Math.PI * 4; a += 0.05) {
          const rad = (a / (Math.PI * 4)) * r * 0.9;
          const px = cx + Math.cos(a + i * 1.57) * rad;
          const py = cy + Math.sin(a + i * 1.57) * rad;
          first ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
          first = false;
        }
        ctx.stroke();
      }
      break;
    }
    // Add other eye styles here following the same pattern...
    default: {
      // Fallback to simple radial gradient
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      g.addColorStop(0, '#ff80c0'); g.addColorStop(1, '#5010a0');
      ctx.fillStyle = g; ctx.fillRect(bounds.x, bounds.y, bounds.w, bounds.h);
      break;
    }
  }
  
  ctx.restore();
  console.log(`✅ Eye pattern drawn within bounds`);
}

// ══════════════════════════════════════════════════════════════
//  EYE LAYER
// ══════════════════════════════════════════════════════════════
function drawEyeLayer(ctx, W, H, style, rng) {
  console.log(`🎨 drawEyeLayer called: style=${style}, dimensions=${W}x${H}`);
  const cx=W/2, cy=H/2, r=Math.min(W,H)*0.48;
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();

  function spiral(offsetAngle, jitter) {
    ctx.beginPath();
    let first=true;
    for(let a=0.01; a<Math.PI*6; a+=0.05) {
      const rad=(a/(Math.PI*6))*r*0.95;
      const jx = jitter ? (rng()-0.5)*rad*0.15 : 0;
      const jy = jitter ? (rng()-0.5)*rad*0.15 : 0;
      const px=cx+Math.cos(a+offsetAngle)*rad+jx;
      const py=cy+Math.sin(a+offsetAngle)*rad+jy;
      first ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
      first=false;
    }
    ctx.stroke();
  }

  switch(style) {
    case 'pink_purple_swirl': {
      const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
      g.addColorStop(0,'#ff80c0'); g.addColorStop(0.5,'#c050c0'); g.addColorStop(1,'#5010a0');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='rgba(255,200,255,0.45)'; ctx.lineWidth=Math.max(2,W*0.015);
      for(let i=0;i<5;i++) spiral(i*1.26, true);
      break;
    }
    case 'gold_white_swirl': {
      const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
      g.addColorStop(0,'#fffce0'); g.addColorStop(0.4,'#e8c060'); g.addColorStop(1,'#7a5010');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='rgba(255,255,230,0.55)'; ctx.lineWidth=Math.max(2,W*0.015);
      for(let i=0;i<5;i++) spiral(i*1.26, false);
      break;
    }
    case 'green_gold_split': {
      const gl=ctx.createLinearGradient(0,0,W,0);
      gl.addColorStop(0,'#0a5020'); gl.addColorStop(0.46,'#1a9a40');
      gl.addColorStop(0.54,'#c9a84c'); gl.addColorStop(1,'#6a4008');
      ctx.fillStyle=gl; ctx.fillRect(0,0,W,H);
      const sl=ctx.createLinearGradient(cx-4,0,cx+4,0);
      sl.addColorStop(0,'rgba(255,255,200,0)'); sl.addColorStop(0.5,'rgba(255,255,200,0.35)'); sl.addColorStop(1,'rgba(255,255,200,0)');
      ctx.fillStyle=sl; ctx.fillRect(cx-4,0,8,H);
      break;
    }
    case 'purple_blue_blob': {
      ctx.fillStyle='#050312'; ctx.fillRect(0,0,W,H);
      [[cx-r*0.2,cy-r*0.15,'#4020a0'],[cx+r*0.2,cy+r*0.1,'#1040c0'],[cx,cy,'#5530b0']].forEach(([bx,by,c])=>{
        const bg=ctx.createRadialGradient(bx,by,0,bx,by,r*(0.5+rng()*0.3));
        bg.addColorStop(0,c+'dd'); bg.addColorStop(1,'transparent');
        ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
      });
      break;
    }
    case 'rainbow_swirl': {
      for(let i=0;i<360;i+=2) {
        ctx.beginPath(); ctx.moveTo(cx,cy);
        ctx.arc(cx,cy,r,i*Math.PI/180,(i+2)*Math.PI/180); ctx.closePath();
        ctx.fillStyle=`hsl(${i},100%,55%)`; ctx.fill();
      }
      ctx.strokeStyle='rgba(255,255,255,0.38)'; ctx.lineWidth=Math.max(1.5,W*0.012);
      for(let i=0;i<4;i++) {
        ctx.beginPath();
        let first=true;
        for(let a=0.01;a<Math.PI*4;a+=0.05){
          const rad=(a/(Math.PI*4))*r*0.9;
          const px=cx+Math.cos(a+i*1.57)*rad, py=cy+Math.sin(a+i*1.57)*rad;
          first ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
          first=false;
        }
        ctx.stroke();
      }
      break;
    }
    case 'cyan_blue_space': {
      ctx.fillStyle='#000c20'; ctx.fillRect(0,0,W,H);
      [[cx-r*0.15,cy-r*0.1,'#00b0c8'],[cx+r*0.2,cy+r*0.15,'#1030c0'],[cx-r*0.1,cy+r*0.2,'#0080b0']].forEach(([bx,by,c])=>{
        const bg=ctx.createRadialGradient(bx,by,0,bx,by,r*(0.45+rng()*0.25));
        bg.addColorStop(0,c+'cc'); bg.addColorStop(1,'transparent');
        ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
      });
      ctx.fillStyle='#ffd700';
      for(let i=0;i<14;i++){
        const sx=rng()*W, sy=rng()*H, sr=0.5+rng()*Math.max(1.5,W*0.008);
        ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fill();
        if(sr>W*0.006){
          ctx.strokeStyle='rgba(255,215,0,0.6)'; ctx.lineWidth=0.5;
          ctx.beginPath(); ctx.moveTo(sx-sr*2,sy); ctx.lineTo(sx+sr*2,sy); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(sx,sy-sr*2); ctx.lineTo(sx,sy+sr*2); ctx.stroke();
        }
      }
      break;
    }
    case 'black_purple_stripes': {
      ctx.fillStyle='#06030f'; ctx.fillRect(0,0,W,H);
      const sw=Math.max(4,W*0.06); ctx.strokeStyle='#3a0878'; ctx.lineWidth=sw*0.6;
      for(let i=-W;i<W*2;i+=sw*1.6){
        ctx.beginPath(); ctx.moveTo(i,-H*0.1); ctx.lineTo(i+H*1.2,H*1.1); ctx.stroke();
      }
      const sg=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
      sg.addColorStop(0,'rgba(80,0,160,0.2)'); sg.addColorStop(1,'transparent');
      ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);
      break;
    }
    case 'pink_purple_hearts': {
      const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
      g.addColorStop(0,'#ffc0d8'); g.addColorStop(1,'#c060a0');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      const hs=Math.max(8,W*0.09); ctx.fillStyle='rgba(140,20,100,0.45)';
      [[cx-r*0.3,cy-r*0.2],[cx+r*0.28,cy+r*0.15],[cx-r*0.05,cy+r*0.3],[cx+r*0.1,cy-r*0.35]].forEach(([hx,hy])=>{
        const s=hs*(0.7+rng()*0.6); ctx.beginPath();
        ctx.moveTo(hx,hy+s*0.4);
        ctx.bezierCurveTo(hx,hy-s*0.2,hx-s,hy-s*0.6,hx-s,hy);
        ctx.bezierCurveTo(hx-s,hy+s*0.7,hx,hy+s*1.1,hx,hy+s*1.3);
        ctx.bezierCurveTo(hx,hy+s*1.1,hx+s,hy+s*0.7,hx+s,hy);
        ctx.bezierCurveTo(hx+s,hy-s*0.6,hx,hy-s*0.2,hx,hy+s*0.4);
        ctx.fill();
      });
      break;
    }
    // NEW EYE STYLES
    case 'molten_lava': {
      const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
      g.addColorStop(0,'#ff4400'); g.addColorStop(0.5,'#ff2200'); g.addColorStop(1,'#880000');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='rgba(255,100,0,0.7)'; ctx.lineWidth=Math.max(2,W*0.018);
      for(let i=0;i<6;i++) spiral(i*1.05, true);
      break;
    }
    case 'forest_green': {
      const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
      g.addColorStop(0,'#40cc40'); g.addColorStop(0.5,'#208820'); g.addColorStop(1,'#0a3a0a');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='rgba(100,255,100,0.4)'; ctx.lineWidth=Math.max(2,W*0.012);
      for(let i=0;i<4;i++) spiral(i*1.57, false);
      break;
    }
    case 'storm_grey': {
      const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
      g.addColorStop(0,'#c0c8d0'); g.addColorStop(0.5,'#708090'); g.addColorStop(1,'#2a3038');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=Math.max(1.5,W*0.01);

    case 'honey_amber': {

      ctx.strokeStyle='rgba(200,200,255,0.3)'; ctx.lineWidth=Math.max(1.5,W*0.01);

    case 'deep_void': {

      sg.addColorStop(0,'#1a0080'); sg.addColorStop(0.5,'#0a0040'); sg.addColorStop(1,'#000008');

      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

// ── Utility: draw a noisy organic stroke between two points ──
function noisyStroke(ctx, x0, y0, x1, y1, rng, jitter) {
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  const steps = 8;
  for (let i = 1; i <= steps; i++) {
    const t = i / steps;
    const mx = x0 + (x1 - x0) * t + (rng() - 0.5) * jitter;
    const my = y0 + (y1 - y0) * t + (rng() - 0.5) * jitter;
    ctx.lineTo(mx, my);
  }
  ctx.stroke();
}

// ── STRIPES: Bold diagonal racing stripes with soft feathered edges ──
function patternStripes(ctx, W, H, rng, mod, color) {
  const [cr, cg, cb] = hexToRgb(color);
  const count = 5 + Math.floor(rng() * 6) + mod;
  const angle = (25 + rng() * 35) * Math.PI / 180 * (rng() > 0.5 ? 1 : -1);
  const diag = Math.sqrt(W * W + H * H);

  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.rotate(angle);

  for (let i = 0; i < count; i++) {
    const t = (i / count) * 2 - 1;
    const cx2 = t * diag * 0.6 + (rng() - 0.5) * diag * 0.15;
    const hw = diag * (0.03 + rng() * 0.06 + mod * 0.008);

    // Core stripe
    const alpha = 0.55 + rng() * 0.3;
    ctx.fillStyle = `rgba(${cr},${cg},${cb},${alpha})`;
    ctx.fillRect(cx2 - hw, -diag, hw * 2, diag * 2);

    // Feathered edges
    const edgeG = ctx.createLinearGradient(cx2 - hw * 2.5, 0, cx2 + hw * 2.5, 0);
    edgeG.addColorStop(0, `rgba(${cr},${cg},${cb},0)`);
    edgeG.addColorStop(0.25, `rgba(${cr},${cg},${cb},${alpha * 0.6})`);
    edgeG.addColorStop(0.5, `rgba(${cr},${cg},${cb},0)`);
    edgeG.addColorStop(0.75, `rgba(${cr},${cg},${cb},${alpha * 0.6})`);
    edgeG.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
    ctx.fillStyle = edgeG;
    ctx.fillRect(cx2 - hw * 2.5, -diag, hw * 5, diag * 2);

    // Thin bright highlight line
    if (rng() > 0.4) {
      ctx.strokeStyle = `rgba(${Math.min(cr+60,255)},${Math.min(cg+60,255)},${Math.min(cb+60,255)},0.35)`;
      ctx.lineWidth = 1 + rng() * 2;
      ctx.beginPath();
      ctx.moveTo(cx2 - hw * 0.3, -diag);
      ctx.lineTo(cx2 - hw * 0.3, diag);
      ctx.stroke();
    }
  }
  ctx.restore();
}

// ── DOTS: Organic leopard/cheetah rosette spots ──
function patternDots(ctx, W, H, rng, mod, color) {
  const [cr, cg, cb] = hexToRgb(color);
  const count = 18 + mod * 6 + Math.floor(rng() * 12);

  for (let i = 0; i < count; i++) {
    const cx2 = rng() * W * 1.2 - W * 0.1;
    const cy2 = rng() * H * 1.2 - H * 0.1;
    const baseR = 8 + rng() * (18 + mod * 3);
    const type = rng();

    if (type < 0.35) {
      // Solid spot with soft fade
      const g = ctx.createRadialGradient(cx2, cy2, 0, cx2, cy2, baseR);
      g.addColorStop(0, `rgba(${cr},${cg},${cb},0.75)`);
      g.addColorStop(0.6, `rgba(${cr},${cg},${cb},0.5)`);
      g.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(cx2, cy2, baseR * 1.4, 0, Math.PI * 2); ctx.fill();

    } else if (type < 0.65) {
      // Rosette: open ring of smaller dots
      const ringR = baseR * 1.1;
      const dotCount = 4 + Math.floor(rng() * 3);
      const dotR = baseR * 0.28 + rng() * baseR * 0.18;
      const startA = rng() * Math.PI * 2;
      for (let j = 0; j < dotCount; j++) {
        const a = startA + (j / dotCount) * Math.PI * 2;
        const dx = cx2 + Math.cos(a) * ringR;
        const dy = cy2 + Math.sin(a) * ringR;
        const alpha = 0.55 + rng() * 0.25;
        const sg = ctx.createRadialGradient(dx, dy, 0, dx, dy, dotR);
        sg.addColorStop(0, `rgba(${cr},${cg},${cb},${alpha})`);
        sg.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
        ctx.fillStyle = sg;
        ctx.beginPath(); ctx.arc(dx, dy, dotR * 1.5, 0, Math.PI * 2); ctx.fill();
      }
      // Faint center
      if (rng() > 0.5) {
        const cg2 = ctx.createRadialGradient(cx2, cy2, 0, cx2, cy2, baseR * 0.5);
        cg2.addColorStop(0, `rgba(${cr},${cg},${cb},0.25)`);
        cg2.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
        ctx.fillStyle = cg2;
        ctx.beginPath(); ctx.arc(cx2, cy2, baseR * 0.7, 0, Math.PI * 2); ctx.fill();
      }

    } else {
      // Irregular blob spot
      ctx.fillStyle = `rgba(${cr},${cg},${cb},${0.4 + rng() * 0.35})`;
      ctx.beginPath();
      const pts = 5 + Math.floor(rng() * 4);
      for (let j = 0; j < pts; j++) {
        const a = (j / pts) * Math.PI * 2;
        const r2 = baseR * (0.55 + rng() * 0.7);
        const px = cx2 + Math.cos(a) * r2;
        const py = cy2 + Math.sin(a) * r2;
        j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath(); ctx.fill();
    }
  }
}

// ── BLOBS: Dappled sunlight through leaves / large cloud shadows ──
function patternBlobs(ctx, W, H, rng, mod, color) {
  const [cr, cg, cb] = hexToRgb(color);
  const count = 6 + Math.floor(rng() * 4) + Math.floor(mod / 2);

  for (let i = 0; i < count; i++) {
    const cx2 = W * (0.05 + rng() * 0.9);
    const cy2 = H * (0.05 + rng() * 0.9);
    const rx = W * (0.1 + rng() * 0.28);
    const ry = H * (0.08 + rng() * 0.22);
    const pts = 10 + Math.floor(rng() * 6);
    const alpha = 0.3 + rng() * 0.35;
    const rotation = rng() * Math.PI;

    // Build an irregular organic blob
    ctx.save();
    ctx.translate(cx2, cy2);
    ctx.rotate(rotation);
    ctx.beginPath();
    for (let j = 0; j < pts; j++) {
      const a = (j / pts) * Math.PI * 2;
      const wobble = 0.6 + rng() * 0.8;
      const r2 = Math.sqrt(rx * rx * Math.cos(a) * Math.cos(a) + ry * ry * Math.sin(a) * Math.sin(a)) * wobble;
      const px = Math.cos(a) * r2;
      const py = Math.sin(a) * r2;
      j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();

    // Gradient fill — brighter center
    const g = ctx.createRadialGradient(0, 0, 0, 0, 0, Math.max(rx, ry));
    g.addColorStop(0, `rgba(${cr},${cg},${cb},${alpha})`);
    g.addColorStop(0.5, `rgba(${cr},${cg},${cb},${alpha * 0.65})`);
    g.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.restore();

    // Rim highlights on some blobs
    if (rng() > 0.55) {
      ctx.save();
      ctx.translate(cx2, cy2);
      ctx.rotate(rotation);
      const rg = ctx.createRadialGradient(0, -ry * 0.3, 0, 0, 0, Math.max(rx, ry) * 1.1);
      rg.addColorStop(0, `rgba(${Math.min(cr+80,255)},${Math.min(cg+80,255)},${Math.min(cb+80,255)},0.2)`);
      rg.addColorStop(0.4, `rgba(${Math.min(cr+40,255)},${Math.min(cg+40,255)},${Math.min(cb+40,255)},0.1)`);
      rg.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
      ctx.fillStyle = rg;
      ctx.beginPath(); ctx.ellipse(0, 0, rx * 1.1, ry * 1.1, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }
}

// ── SHARP: Crystalline shards / dragon scale facets / broken glass ──
function patternSharp(ctx, W, H, rng, mod, color) {
  const [cr, cg, cb] = hexToRgb(color);
  const count = 12 + mod * 3 + Math.floor(rng() * 10);

  for (let i = 0; i < count; i++) {
    const cx2 = rng() * W;
    const cy2 = rng() * H;
    const size = 20 + rng() * (55 + mod * 8);
    const sides = 3 + Math.floor(rng() * 3); // triangles to pentagons
    const elongation = 0.3 + rng() * 1.4; // how spiky
    const rot = rng() * Math.PI * 2;
    const alpha = 0.3 + rng() * 0.45;

    ctx.beginPath();
    for (let j = 0; j < sides; j++) {
      const a = rot + (j / sides) * Math.PI * 2;
      // alternate long and short radii for spiky effect
      const r2 = j % 2 === 0 ? size * elongation : size * (0.3 + rng() * 0.4);
      const px = cx2 + Math.cos(a) * r2;
      const py = cy2 + Math.sin(a) * r2;
      j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();

    // Faceted gradient — lit from upper-left
    const litX = cx2 - size * 0.4;
    const litY = cy2 - size * 0.4;
    const fg = ctx.createRadialGradient(litX, litY, 0, cx2, cy2, size * elongation);
    fg.addColorStop(0, `rgba(${Math.min(cr+70,255)},${Math.min(cg+70,255)},${Math.min(cb+70,255)},${alpha * 0.9})`);
    fg.addColorStop(0.5, `rgba(${cr},${cg},${cb},${alpha})`);
    fg.addColorStop(1, `rgba(${Math.max(cr-40,0)},${Math.max(cg-40,0)},${Math.max(cb-40,0)},${alpha * 0.5})`);
    ctx.fillStyle = fg;
    ctx.fill();

    // Bright edge on one side
    if (rng() > 0.5) {
      ctx.strokeStyle = `rgba(${Math.min(cr+100,255)},${Math.min(cg+100,255)},${Math.min(cb+100,255)},0.3)`;
      ctx.lineWidth = 0.5 + rng() * 1.5;
      ctx.stroke();
    }
  }
}

// ── TWISTING: Sinuous river-delta tendrils, branching organically ──
function patternTwisting(ctx, W, H, rng, mod, color) {
  const [cr, cg, cb] = hexToRgb(color);
  const rootCount = 3 + Math.floor(mod / 2) + Math.floor(rng() * 3);

  function branch(x, y, angle, length, width, depth) {
    if (depth <= 0 || length < 2) return;
    const alpha = 0.35 + (depth / 6) * 0.35;
    const segments = 8 + Math.floor(rng() * 6);
    let cx2 = x, cy2 = y, curAngle = angle;

    ctx.strokeStyle = `rgba(${cr},${cg},${cb},${alpha})`;
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    for (let i = 0; i < segments; i++) {
      const newX = cx2 + Math.cos(curAngle) * (length / segments);
      const newY = cy2 + Math.sin(curAngle) * (length / segments);
      // Noisy stroke segment
      noisyStroke(ctx, cx2, cy2, newX, newY, rng, width * 0.8);
      curAngle += (rng() - 0.5) * 0.7;
      cx2 = newX; cy2 = newY;
    }

    // Branch off
    if (depth > 1 && rng() > 0.35) {
      const branchAngle1 = curAngle + (0.3 + rng() * 0.6);
      const branchAngle2 = curAngle - (0.3 + rng() * 0.6);
      branch(cx2, cy2, branchAngle1, length * (0.55 + rng() * 0.25), width * 0.65, depth - 1);
      if (rng() > 0.45) {
        branch(cx2, cy2, branchAngle2, length * (0.45 + rng() * 0.3), width * 0.55, depth - 1);
      }
    }
  }

  for (let i = 0; i < rootCount; i++) {
    const startX = rng() > 0.5 ? rng() * W : (rng() > 0.5 ? 0 : W);
    const startY = rng() * H;
    const startAngle = rng() * Math.PI * 2;
    const initLen = H * (0.25 + rng() * 0.4);
    const initWidth = 6 + rng() * (8 + mod * 2);
    branch(startX, startY, startAngle, initLen, initWidth, 4 + Math.floor(mod / 2));
  }
}

// ── WAVES: Layered ocean swells with whitecaps and depth variation ──
function patternWaves(ctx, W, H, rng, mod, color) {
  const [cr, cg, cb] = hexToRgb(color);
  const layerCount = 5 + Math.floor(mod / 2) + Math.floor(rng() * 4);

  for (let layer = 0; layer < layerCount; layer++) {
    const t = layer / layerCount;
    const yBase = H * (0.05 + t * 0.9 + (rng() - 0.5) * 0.1);
    const amplitude = 12 + rng() * (30 + mod * 4);
    const frequency = (1.5 + rng() * 3.5) * Math.PI * 2 / W;
    const phase = rng() * Math.PI * 2;
    const phase2 = rng() * Math.PI * 2; // secondary wave
    const alpha = 0.25 + rng() * 0.45;
    const strokeW = 2 + rng() * (6 + mod);

    // Draw filled wave band
    ctx.beginPath();
    ctx.moveTo(0, yBase + Math.sin(phase) * amplitude);
    for (let x = 0; x <= W; x += 3) {
      // Combine two frequencies for more organic look
      const y = yBase
        + Math.sin(x * frequency + phase) * amplitude
        + Math.sin(x * frequency * 1.618 + phase2) * amplitude * 0.38;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H * 1.2);
    ctx.lineTo(0, H * 1.2);
    ctx.closePath();
    ctx.fillStyle = `rgba(${cr},${cg},${cb},${alpha * 0.35})`;
    ctx.fill();

    // Crest stroke
    ctx.beginPath();
    ctx.moveTo(0, yBase + Math.sin(phase) * amplitude);
    for (let x = 0; x <= W; x += 2) {
      const y = yBase
        + Math.sin(x * frequency + phase) * amplitude
        + Math.sin(x * frequency * 1.618 + phase2) * amplitude * 0.38;
      ctx.lineTo(x, y);
    }
    ctx.strokeStyle = `rgba(${cr},${cg},${cb},${alpha})`;
    ctx.lineWidth = strokeW;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Whitecap sparkles on top of wave crests
    if (rng() > 0.4) {
      const capCount = 2 + Math.floor(rng() * 4);
      for (let k = 0; k < capCount; k++) {
        const kx = (0.1 + rng() * 0.8) * W;
        const ky = yBase
          + Math.sin(kx * frequency + phase) * amplitude
          + Math.sin(kx * frequency * 1.618 + phase2) * amplitude * 0.38;
        const capLen = 8 + rng() * 20;
        ctx.strokeStyle = `rgba(${Math.min(cr+80,255)},${Math.min(cg+80,255)},${Math.min(cb+80,255)},0.5)`;
        ctx.lineWidth = 1 + rng() * 2;
        ctx.beginPath();
        ctx.moveTo(kx - capLen * 0.4, ky - 2);
        ctx.lineTo(kx + capLen * 0.6, ky - 2);
        ctx.stroke();
      }
    }
  }
}

// ── SOFTBLUR: Nebula / watercolor wash / aurora borealis ──
function patternSoftBlur(ctx, W, H, rng, mod, color) {
  const [cr, cg, cb] = hexToRgb(color);
  const count = 7 + Math.floor(mod / 2) + Math.floor(rng() * 5);

  for (let i = 0; i < count; i++) {
    const cx2 = (rng() * 1.4 - 0.2) * W;
    const cy2 = (rng() * 1.4 - 0.2) * H;
    const outerR = 50 + rng() * (130 + mod * 15);
    const innerR = outerR * (0.05 + rng() * 0.3);
    const alpha = 0.2 + rng() * 0.4;

    // Slightly shifted inner point for directionality
    const offsetX = (rng() - 0.5) * outerR * 0.4;
    const offsetY = (rng() - 0.5) * outerR * 0.4;
    const g = ctx.createRadialGradient(
      cx2 + offsetX, cy2 + offsetY, innerR,
      cx2, cy2, outerR
    );
    g.addColorStop(0, `rgba(${cr},${cg},${cb},${alpha})`);
    g.addColorStop(0.35, `rgba(${cr},${cg},${cb},${alpha * 0.55})`);
    g.addColorStop(0.7, `rgba(${cr},${cg},${cb},${alpha * 0.18})`);
    g.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
    ctx.fillStyle = g;
    ctx.beginPath();

    // Irregular oval rather than perfect circle
    ctx.save();
    ctx.translate(cx2, cy2);
    ctx.rotate(rng() * Math.PI);
    ctx.scale(1, 0.4 + rng() * 0.9);
    ctx.arc(0, 0, outerR, 0, Math.PI * 2);
    ctx.restore();
    ctx.fill();
  }

  // Aurora streaks on top
  const streakCount = 2 + Math.floor(rng() * 3);
  for (let i = 0; i < streakCount; i++) {
    const y0 = rng() * H;
    const y1 = y0 + (rng() - 0.5) * H * 0.3;
    const alpha2 = 0.12 + rng() * 0.2;
    const sg = ctx.createLinearGradient(0, y0, W, y1);
    sg.addColorStop(0, `rgba(${cr},${cg},${cb},0)`);
    sg.addColorStop(0.2, `rgba(${cr},${cg},${cb},${alpha2})`);
    sg.addColorStop(0.5, `rgba(${Math.min(cr+50,255)},${Math.min(cg+50,255)},${Math.min(cb+50,255)},${alpha2 * 1.3})`);
    sg.addColorStop(0.8, `rgba(${cr},${cg},${cb},${alpha2})`);
    sg.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
    const bandH = 20 + rng() * 60;
    ctx.fillStyle = sg;
    ctx.fillRect(0, Math.min(y0, y1) - bandH / 2, W, bandH + Math.abs(y1 - y0));
  }
}

const colorHex     = answers.colorHex;
const colorKey     = answers.color   || 'gold';
const eyeStyle     = answers.eyeStyle || 'rainbow_swirl';
const patternType  = answers.patternType || 'blobs';
const seedMod      = typeof answers.seedMod === 'number' ? answers.seedMod : 0;
const descriptions = Array.isArray(answers.descriptions) ? answers.descriptions : [];

console.log('🐉 === DRAGON GENERATION START ===');
console.log('📦 Answers payload:', answers);
console.log('🐲 Dragon key:', dragonKey);
console.log('🎨 Base color:', colorKey, colorHex);
console.log('👁️ Eye style:', eyeStyle);
console.log('🔲 Pattern type:', patternType);
console.log('🔢 Seed modifier:', seedMod);
console.log('📝 Descriptions:', descriptions);

// Pattern color: from q6 if available, otherwise derive a contrasting color
const patternColorHex = answers.patternColorHex || (() => {
  // Fallback: shift the base color hue by ~120° for contrast
  const [r, g, b] = hexToRgb(colorHex || '#c9a84c');
  const [h, s, v] = rgbToHsv(r, g, b);
  const newH = (h + 0.33) % 1.0;
  const [nr, ng, nb] = hsvToRgb(newH, Math.min(s * 1.2, 1.0), Math.min(v * 1.1, 1.0));
  const fallbackHex = '#' + [nr, ng, nb].map(x => x.toString(16).padStart(2, '0')).join('');
  console.log('🎨 No patternColorHex in answers, using fallback:', fallbackHex);
  return fallbackHex;
})();
console.log('🎨 Pattern color hex:', patternColorHex);

const info = DRAGON_INFO[dragonKey] || { name: dragonKey, subtitle: 'Of Ancient Lineage' };

// ── UI text ───────────────────────────────────────────────────
document.getElementById('dragon-name').textContent     = info.name;
document.getElementById('dragon-subtitle').textContent = info.subtitle;
document.getElementById('dragon-frame').style.setProperty(
  '--glow', COLOR_GLOW[colorKey] || 'rgba(201,168,76,0.18)'
);

const descEl = document.getElementById('descriptions');
descriptions.forEach(line => {
  const d = document.createElement('div');
  d.className = 'desc-line';
  d.textContent = line;
  descEl.appendChild(d);
});
if (descriptions.length === 0) descEl.style.display = 'none';

// ── Independent seeds ─────────────────────────────────────────
const eyeSeed     = (strHash(dragonKey) ^ strHash(eyeStyle)  ^ 0xcafe1234) >>> 0;
const patternSeed = (strHash(dragonKey) ^ strHash(colorKey)  ^ (seedMod * 0x9e3779b9)) >>> 0;
console.log('🌱 Eye seed:', eyeSeed);
console.log('🌱 Pattern seed:', patternSeed);

// ── Load images ───────────────────────────────────────────────
const clippingPath = `base/clipping/${dragonKey}.png`;
const linesPath    = `base/lines/${dragonKey}.png`;
const eyePath      = `base/extra/EYEBALL.png`;

console.log('📁 Loading images:');
console.log('   Clipping:', clippingPath);
console.log('   Lines:', linesPath);
console.log('   Eye overlay:', eyePath);

const canvas = document.getElementById('output-canvas');
const ctx    = canvas.getContext('2d');

Promise.all([
  loadImage(clippingPath),
  loadImage(linesPath),
  loadImage(eyePath).catch(() => { console.warn('⚠️ EYEBALL.png not found — eye layer will be drawn without mask'); return null; }),
]).then(([clippingImg, linesImg, eyeImg]) => {
  const W = Math.max(clippingImg.naturalWidth,  linesImg.naturalWidth);
  const H = Math.max(clippingImg.naturalHeight, linesImg.naturalHeight);
  canvas.width=W; canvas.height=H;
  console.log(`📐 Canvas dimensions: ${W}x${H}`);

  // ── A: Base — clipping flat-recolored ─────────────────────
  console.log('🎨 Step A: Drawing base layer...');
  const offBase = makeOff(W,H), ctxBase = offBase.getContext('2d');
  ctxBase.drawImage(clippingImg, 0, 0);
  const baseData = ctxBase.getImageData(0,0,W,H);
  flatRecolor(baseData, colorHex);
  ctxBase.putImageData(baseData, 0, 0);

  // ── B: Body pattern — colored, masked to clipping shape ───
  console.log(`🎨 Step B: Drawing body pattern (${patternType})...`);
  const offPat = makeOff(W,H), ctxPat = offPat.getContext('2d');
  const patRng = mulberry32(patternSeed);
  (PATTERN_FNS[patternType] || patternBlobs)(ctxPat, W, H, patRng, seedMod, patternColorHex);
  ctxPat.globalCompositeOperation = 'destination-in';
  ctxPat.drawImage(clippingImg, 0, 0);
  ctxPat.globalCompositeOperation = 'source-over';

  // ── C: Composite base + pattern → "beneath" canvas ───────
  console.log('🎨 Step C: Compositing base + pattern...');
  const offBeneath = makeOff(W,H), ctxBeneath = offBeneath.getContext('2d');
  ctxBeneath.drawImage(offBase, 0, 0);
  ctxBeneath.drawImage(offPat,  0, 0);

// ── D: Eye layer — generate pattern only within eyeball bounds ──
console.log(`🎨 Step D: Drawing eye layer (style: ${eyeStyle})...`);

// First, analyze EYEBALL.png to find its bounds (where non-transparent pixels are)
let eyeBounds = { x: 0, y: 0, w: W, h: H };
let hasEyeImg = false;

if (eyeImg) {
  console.log('   Analyzing EYEBALL.png to find non-transparent bounds...');
  
  // Create temp canvas to analyze the mask
  const boundsCanvas = makeOff(W, H);
  const boundsCtx = boundsCanvas.getContext('2d');
  boundsCtx.drawImage(eyeImg, 0, 0, W, H);
  const boundsData = boundsCtx.getImageData(0, 0, W, H);
  const pixels = boundsData.data;
  
  // Find min/max x,y where alpha > 50
  let minX = W, minY = H, maxX = 0, maxY = 0;
  let foundPixels = 0;
  
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const idx = (y * W + x) * 4;
      if (pixels[idx + 3] > 50) {
        foundPixels++;
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
    }
  }
  
  if (foundPixels > 0) {
    eyeBounds = { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
    console.log(`   Eyeball bounds: x=${eyeBounds.x}, y=${eyeBounds.y}, w=${eyeBounds.w}, h=${eyeBounds.h}, pixels=${foundPixels}`);
    hasEyeImg = true;
  } else {
    console.log('   WARNING: No non-transparent pixels found in EYEBALL.png!');
  }
}

// Create canvas for the eye layer
const offEyeArt = makeOff(W, H);
const ctxEyeArt = offEyeArt.getContext('2d');

// Generate the eye pattern ONLY within the eyeball bounds
console.log(`   Generating eye pattern within bounds...`);
drawEyeLayerWithinBounds(ctxEyeArt, W, H, eyeStyle, mulberry32(eyeSeed), eyeBounds);

// If we have an eyeball mask, use it to clip the pattern exactly
if (hasEyeImg) {
  console.log('   Masking pattern to exact eyeball shape...');
  
  const offEyeMask = makeOff(W, H);
  const ctxEyeMask = offEyeMask.getContext('2d');
  ctxEyeMask.drawImage(eyeImg, 0, 0, W, H);
  
  // Use mask to clip the pattern (destination-in keeps pattern where mask is opaque)
  ctxEyeArt.globalCompositeOperation = 'destination-in';
  ctxEyeArt.drawImage(offEyeMask, 0, 0);
  ctxEyeArt.globalCompositeOperation = 'source-over';
  
  console.log('   Pattern masked to eyeball shape');
}

// Composite the eye onto the beneath canvas
ctxBeneath.drawImage(offEyeArt, 0, 0);
console.log('✅ Eye layer composited');
  
  // DEBUG: Create button to save eye layer alone for inspection
const debugEyeBtn = document.createElement('button');
debugEyeBtn.textContent = '🐉 DEBUG: Download Eye Layer Only';
debugEyeBtn.style.cssText = 'position:fixed; bottom:10px; right:10px; z-index:9999; background:#c9a84c; color:#000; border:none; padding:8px 12px; border-radius:4px; font-size:12px; cursor:pointer; font-family:monospace;';
debugEyeBtn.onclick = () => {
  const debugCanvas = document.createElement('canvas');
  debugCanvas.width = W;
  debugCanvas.height = H;
  const debugCtx = debugCanvas.getContext('2d');
  debugCtx.drawImage(offEyeArt, 0, 0);
  const a = document.createElement('a');
  a.download = `debug_eye_layer_${Date.now()}.png`;
  a.href = debugCanvas.toDataURL();
  a.click();
  console.log('👁️ DEBUG: Eye layer downloaded');
};
document.body.appendChild(debugEyeBtn);
debugEyeBtn.style.display = 'none';

  const beneathData = ctxBeneath.getImageData(0,0,W,H);

  // ── E: Lineart — recolored by sampling beneathData ────────
  console.log('🎨 Step E: Recoloring lineart (MUCH more saturated + darker)...');
  const offLine = makeOff(W,H), ctxLine = offLine.getContext('2d');
  ctxLine.drawImage(linesImg, 0, 0);
  const lineData = ctxLine.getImageData(0,0,W,H);
  recolorLineartFromBase(lineData, beneathData);
  ctxLine.putImageData(lineData, 0, 0);

  // ── FINAL: draw all layers onto output canvas ─────────────
  console.log('🎨 Step F: Final compositing...');
  ctx.clearRect(0,0,W,H);
  ctx.drawImage(offBeneath, 0, 0);
  ctx.globalAlpha = 0.82;
  ctx.drawImage(offLine, 0, 0);
  ctx.globalAlpha = 1.0;

  console.log('✅ Dragon generation complete!');
  document.getElementById('loading-msg').style.display='none';
  canvas.style.display='block';
  document.getElementById('download-btn').style.display='inline-block';

}).catch(err=>{
  console.error('❌ ERROR in dragon generation:', err);
  showError(`Couldn't load dragon files.<br><small style="opacity:0.5">${err.message}</small>`);
});

// ── Download ──────────────────────────────────────────────────
document.getElementById('download-btn').addEventListener('click', ()=>{
  const a=document.createElement('a');
  a.download=`${dragonKey}_${colorKey}_${patternType}.png`;
  a.href=canvas.toDataURL('image/png');
  a.click();
  console.log('📸 PNG downloaded');
});

// ── Retake ────────────────────────────────────────────────────
document.getElementById('retake-btn').addEventListener('click', ()=>{
  console.log('🔄 Retaking quiz — clearing cookies and redirecting...');
  deleteCookie('quiz_dragon_person_01_answers');
  deleteCookie('quiz_dragon_person_01_done');
  window.location.href='index.html';
});
</script>
</body>
</html>
